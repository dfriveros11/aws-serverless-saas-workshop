AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Serverless SaaS - Cost by tenant

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Deployment environment for the workshop

  Owner:
    Type: String
    Default: workshop-participant
    Description: Owner identifier for resource tracking

  CostCenter:
    Type: String
    Default: serverless-saas-workshop
    Description: Cost center for billing allocation

Globals:
  Function:
    Timeout: 29

Resources: 
  # CloudWatch Log Groups for Lambda functions
  # Note: Retention and tags are set by post-deployment script to avoid race conditions
  AWSCURInitializerFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab7-aws-cur-initializer

  GetDynamoDBUsageAndCostByTenantFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab7-dynamodb-cost

  GetLambdaUsageAndCostByTenantFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab7-lambda-cost

  CURBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy : Retain
    Properties:
      BucketName: !Sub 
        - 'serverless-saas-lab7-cur-${ShortId}'
        - ShortId: !Select [0, !Split ['-', !Select [2, !Split ['/', !Ref 'AWS::StackId']]]]
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: 'AES256'
      PublicAccessBlockConfiguration: 
        BlockPublicAcls: True
        BlockPublicPolicy: True
        IgnorePublicAcls: True
        RestrictPublicBuckets: True
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab7
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
        
  AWSCURDatabase:
    Type: 'AWS::Glue::Database'
    Properties:
      DatabaseInput:
        Name: !Sub 'costexplorerdb-lab7'
      CatalogId: !Ref AWS::AccountId

         

  AWSCURCrawlerComponentFunction:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: aws-cur-crawler-component-role-lab7
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - glue.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      Path: /
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/service-role/AWSGlueServiceRole'
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab7
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
      Policies:
        - PolicyName: AWSCURCrawlerComponentFunction
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - 'logs:CreateLogGroup'
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                Resource: !Sub 'arn:${AWS::Partition}:logs:*:*:*'
              - Effect: Allow
                Action:
                  - 'glue:UpdateDatabase'
                  - 'glue:UpdatePartition'
                  - 'glue:CreateTable'
                  - 'glue:UpdateTable'
                  - 'glue:ImportCatalogToGlue'
                Resource: '*'
              - Effect: Allow
                Action:
                  - 's3:GetObject'
                  - 's3:PutObject'
                Resource: !Sub '${CURBucket.Arn}*'
        - PolicyName: AWSCURKMSDecryption
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - 'kms:Decrypt'
                Resource: '*'
       

  AWSCURCrawlerLambdaExecutor:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: aws-cur-crawler-lambda-executor-role-lab7
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      Path: /
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab7
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
      Policies:
        - PolicyName: AWSCURCrawlerLambdaExecutor
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - 'logs:CreateLogGroup'
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                Resource: !Sub 'arn:${AWS::Partition}:logs:*:*:*'
              - Effect: Allow
                Action:
                  - 'glue:StartCrawler'
                Resource: '*'
       

  AWSCURCrawler:
    Type: 'AWS::Glue::Crawler'
    DependsOn:
      - AWSCURDatabase
      - AWSCURCrawlerComponentFunction
    Properties:
      Name: AWSCURCrawler-Multi-tenant-lab7
      Description: A recurring crawler that keeps your CUR table in Athena up-to-date.
      Role: !GetAtt AWSCURCrawlerComponentFunction.Arn
      DatabaseName: !Ref AWSCURDatabase
      Targets:
        S3Targets:
          - Path: !Sub 's3://${CURBucket}/curoutput'
            Exclusions:
              - '**.json'
              - '**.yml'
              - '**.sql'
              - '**.csv'
              - '**.gz'
              - '**.zip'
      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
        DeleteBehavior: DELETE_FROM_DATABASE
       

  AWSCURInitializerFunction:
    Type: 'AWS::Lambda::Function'
    DependsOn:
      - AWSCURCrawler
      - AWSCURInitializerFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab7-aws-cur-initializer
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab7
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
      Code:
        ZipFile: |
          import json
          import boto3
          
          def handler(event, context):
              """Lambda handler for CUR initializer - starts Glue Crawler"""
              print(f"Received event: {json.dumps(event)}")
              
              glue = boto3.client('glue')
              crawler_name = 'AWSCURCrawler-Multi-tenant-lab7'
              
              try:
                  response = glue.start_crawler(Name=crawler_name)
                  print(f"Successfully started crawler: {crawler_name}")
                  return {
                      'statusCode': 200,
                      'body': json.dumps({
                          'message': 'Crawler started successfully',
                          'crawler': crawler_name
                      })
                  }
              except glue.exceptions.CrawlerRunningException as e:
                  # Crawler is already running - this is not an error
                  print(f"Crawler already running: {e}")
                  return {
                      'statusCode': 200,
                      'body': json.dumps({
                          'message': 'Crawler is already running',
                          'crawler': crawler_name
                      })
                  }
              except Exception as e:
                  error_msg = f"Error starting crawler: {str(e)}"
                  print(error_msg)
                  return {
                      'statusCode': 500,
                      'body': json.dumps({
                          'error': error_msg,
                          'crawler': crawler_name
                      })
                  }
      Handler: 'index.handler'
      Timeout: 30
      Runtime: python3.14
      ReservedConcurrentExecutions: 1
      Role: !GetAtt AWSCURCrawlerLambdaExecutor.Arn


  
  TenantCostandUsageAttributionTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: Date
          AttributeType: N
        - AttributeName: TenantId#ServiceName
          AttributeType: S
      KeySchema:
        - AttributeName: Date
          KeyType: HASH
        - AttributeName: TenantId#ServiceName
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST 
      TableName: TenantCostAndUsageAttribution-lab7
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab7
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
  

  QueryLogInsightsExecutionRole:
    Type: AWS::IAM::Role     
    Properties:
      RoleName: query-log-insights-execution-role-lab7
      Path: '/'
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab7
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
      Policies:
        - PolicyName: query-log-insight-lab7
          PolicyDocument:
            Version: 2012-10-17
            Statement:              
              - Effect: Allow
                Action:
                  - logs:GetQueryResults
                  - logs:StartQuery
                  - logs:StopQuery
                  - logs:FilterLogEvents
                  - logs:DescribeLogGroups
                  - cloudformation:ListStackResources
                  - cloudformation:DescribeStacks
                Resource:
                  - "*"
              - Effect: Allow
                Action:
                  - s3:*
                Resource:
                  - !Sub 'arn:aws:s3:::${CURBucket}*'
              - Effect: Allow
                Action:
                  - dynamodb:*
                Resource:
                  - !GetAtt TenantCostandUsageAttributionTable.Arn
              - Effect: Allow
                Action:
                  - Athena:*
                Resource:
                  - "*"
              - Effect: Allow
                Action:
                  - glue:*
                Resource:
                  - "*"
                  
  GetDynamoDBUsageAndCostByTenantFunction:
    Type: AWS::Serverless::Function 
    DependsOn:
      - QueryLogInsightsExecutionRole
      - GetDynamoDBUsageAndCostByTenantFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab7-dynamodb-cost
      CodeUri: TenantUsageAndCost/
      Handler: tenant_usage_and_cost.calculate_daily_dynamodb_attribution_by_tenant
      Runtime: python3.14  
      Role: !GetAtt QueryLogInsightsExecutionRole.Arn
      Tags:
        Application: serverless-saas-workshop
        Lab: lab7
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
      Environment:
        Variables:
          ATHENA_S3_OUTPUT: !Ref CURBucket
      Events:
        ScheduledEvent:
          Type: Schedule
          Properties:
            Name: CalculateDynamoUsageAndCostByTenant-lab7
            Schedule: rate(5 minutes)
  
  GetLambdaUsageAndCostByTenantFunction:
    Type: AWS::Serverless::Function 
    DependsOn:
      - QueryLogInsightsExecutionRole
      - GetLambdaUsageAndCostByTenantFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab7-lambda-cost
      CodeUri: TenantUsageAndCost/
      Handler: tenant_usage_and_cost.calculate_daily_lambda_attribution_by_tenant
      Runtime: python3.14  
      Role: !GetAtt QueryLogInsightsExecutionRole.Arn
      Tags:
        Application: serverless-saas-workshop
        Lab: lab7
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
      Environment:
        Variables:
          ATHENA_S3_OUTPUT: !Ref CURBucket
      Events:
        ScheduledEvent:
          Type: Schedule
          Properties:
            Name: CalculateLambdaUsageAndCostByTenant-lab7
            Schedule: rate(5 minutes)

Outputs:
    CURBucketname:
        Description: The name of S3 bucket name
        Value: !Ref CURBucket
        Export:
          Name: "CURBucketname"       

    AWSCURInitializerFunctionName:
        Description: Function name of CUR initializer
        Value: !Ref AWSCURInitializerFunction
        Export:
          Name: "AWSCURInitializerFunctionName"     