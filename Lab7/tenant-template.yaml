AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Lab7 - Minimal Tenant Stack for Cost Attribution Demo

Resources:
  TenantLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: tenant-lambda-execution-role-pooled-lab7
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource: '*'

  CreateProductFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: create-product-pooled-lab7
      Handler: index.handler
      Runtime: python3.9
      Role: !GetAtt TenantLambdaExecutionRole.Arn
      InlineCode: |
        import json
        import boto3
        from decimal import Decimal
        
        dynamodb = boto3.resource('dynamodb')
        table = dynamodb.Table('Product-pooled-lab7')
        
        def handler(event, context):
            tenant_id = 'pooled'
            
            # Simple product creation
            product_id = event.get('productId', 'prod-123')
            product_name = event.get('productName', 'Sample Product')
            price = Decimal(str(event.get('price', 99.99)))
            
            # Put item - Request consumed capacity from DynamoDB
            response = table.put_item(
                Item={
                    'productId': product_id,
                    'productName': product_name,
                    'price': price,
                    'tenantId': tenant_id
                },
                ReturnConsumedCapacity='TOTAL'
            )
            
            # Extract actual consumed capacity from response
            consumed_capacity = response.get('ConsumedCapacity', {})
            consumed_wcu = consumed_capacity.get('CapacityUnits', 0)
            
            # Log for cost attribution with actual consumed capacity
            print(json.dumps({
                'message': 'Request completed',
                'tenant_id': tenant_id,
                'consumed_rcu': 0,  # Write operation
                'consumed_wcu': consumed_wcu
            }))
            
            return {
                'statusCode': 200,
                'body': json.dumps({'message': 'Product created', 'productId': product_id})
            }

  UpdateProductFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: update-product-pooled-lab7
      Handler: index.handler
      Runtime: python3.9
      Role: !GetAtt TenantLambdaExecutionRole.Arn
      InlineCode: |
        import json
        import boto3
        from decimal import Decimal
        
        dynamodb = boto3.resource('dynamodb')
        table = dynamodb.Table('Product-pooled-lab7')
        
        def handler(event, context):
            tenant_id = 'pooled'
            
            # Simple product update
            product_id = event.get('productId', 'prod-123')
            product_name = event.get('productName', 'Updated Product')
            price = Decimal(str(event.get('price', 149.99)))
            
            # Update item - Request consumed capacity from DynamoDB
            response = table.update_item(
                Key={'productId': product_id},
                UpdateExpression='SET productName = :name, price = :price',
                ExpressionAttributeValues={
                    ':name': product_name,
                    ':price': price
                },
                ReturnConsumedCapacity='TOTAL'
            )
            
            # Extract actual consumed capacity from response
            consumed_capacity = response.get('ConsumedCapacity', {})
            consumed_wcu = consumed_capacity.get('CapacityUnits', 0)
            
            # Log for cost attribution with actual consumed capacity
            print(json.dumps({
                'message': 'Request completed',
                'tenant_id': tenant_id,
                'consumed_rcu': 0,  # Write operation
                'consumed_wcu': consumed_wcu
            }))
            
            return {
                'statusCode': 200,
                'body': json.dumps({'message': 'Product updated', 'productId': product_id})
            }

  GetProductsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: get-products-pooled-lab7
      Handler: index.handler
      Runtime: python3.9
      Role: !GetAtt TenantLambdaExecutionRole.Arn
      InlineCode: |
        import json
        import boto3
        from decimal import Decimal
        
        dynamodb = boto3.resource('dynamodb')
        table = dynamodb.Table('Product-pooled-lab7')
        
        class DecimalEncoder(json.JSONEncoder):
            def default(self, obj):
                if isinstance(obj, Decimal):
                    return float(obj)
                return super(DecimalEncoder, self).default(obj)
        
        def handler(event, context):
            tenant_id = 'pooled'
            
            # Scan for products - Request consumed capacity from DynamoDB
            response = table.scan(
                ReturnConsumedCapacity='TOTAL'
            )
            
            # Extract actual consumed capacity from response
            consumed_capacity = response.get('ConsumedCapacity', {})
            consumed_rcu = consumed_capacity.get('CapacityUnits', 0)
            
            # Log for cost attribution with actual consumed capacity
            print(json.dumps({
                'message': 'Request completed',
                'tenant_id': tenant_id,
                'consumed_rcu': consumed_rcu,
                'consumed_wcu': 0  # Read operation
            }))
            
            return {
                'statusCode': 200,
                'body': json.dumps({
                    'products': response.get('Items', [])
                }, cls=DecimalEncoder)
            }

  ProductTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Product-pooled-lab7
      AttributeDefinitions:
        - AttributeName: productId
          AttributeType: S
      KeySchema:
        - AttributeName: productId
          KeyType: HASH
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5

Outputs:
  CreateProductFunctionArn:
    Description: ARN of Create Product Function
    Value: !GetAtt CreateProductFunction.Arn
  
  UpdateProductFunctionArn:
    Description: ARN of Update Product Function
    Value: !GetAtt UpdateProductFunction.Arn
  
  GetProductsFunctionArn:
    Description: ARN of Get Products Function
    Value: !GetAtt GetProductsFunction.Arn
  
  ProductTableName:
    Description: Name of Product DynamoDB Table
    Value: !Ref ProductTable
