# -----------------------------------------------------------------------------
# IMPLEMENTATION NOTES
# -----------------------------------------------------------------------------
# 1. Tag Format Variations:
#    - Some resources use "Tags:" with key-value pairs (Lambda, API Gateway)
#    - Some resources use "Tags:" with Key-Value array format (DynamoDB, S3, IAM)
#    - Cognito User Pools use "UserPoolTags:" instead of "Tags:"
#
# 2. Resources That Don't Support Tags:
#    - Lambda Layers (AWS::Lambda::LayerVersion)
#    - IAM Policies (AWS::IAM::Policy, AWS::IAM::ManagedPolicy)
#    - Cognito User Pool Clients (AWS::Cognito::UserPoolClient)
#    - API Gateway Stages (AWS::ApiGateway::Stage) - use API-level tags
#    - API Gateway Deployments (AWS::ApiGateway::Deployment)
#
# 3. Lab-Specific Tag Values:
#    - Lab 1: Lab: lab1
#    - Lab 2: Lab: lab2
#    - Lab 3: Lab: lab3
#    - Lab 4: Lab: lab4
#    - Lab 5: Lab: lab5
#    - Lab 6: Lab: lab6
#    - Lab 7: Lab: lab7
#
# 4. Tenant-Specific Resources:
#    - Add TenantId and TenantTier tags for resources dedicated to specific tenants
#    - Pooled resources should NOT have TenantId tags
#
# 5. Parameter Usage:
#    - Use !Ref for parameter values: !Ref Environment, !Ref Owner, !Ref CostCenter
#    - Hardcode Application and Lab values as they're constant per template
#
# 6. Validation:
#    - Use AWS CLI to verify tags: aws resourcegroupstaggingapi get-resources
#    - Use AWS Cost Explorer to track costs by tag
#    - Use AWS Resource Groups to organize resources by tags
#
# -----------------------------------------------------------------------------
# QUICK REFERENCE: Tag Format by Resource Type
# -----------------------------------------------------------------------------
# Key-Value Format (Tags:):
#   - AWS::Serverless::Function
#   - AWS::Lambda::Function
#   - AWS::Serverless::Api
#   - AWS::ApiGateway::RestApi
#
# Key-Value Array Format (Tags: - Key/Value):
#   - AWS::DynamoDB::Table
#   - AWS::S3::Bucket
#   - AWS::IAM::Role
#   - AWS::Logs::LogGroup
#   - AWS::Events::Rule
#   - AWS::CodePipeline::Pipeline
#   - AWS::CodeCommit::Repository
#   - AWS::SQS::Queue
#   - AWS::SNS::Topic
#
# Special Format (UserPoolTags:):
#   - AWS::Cognito::UserPool
#
# No Tags Support:
#   - AWS::Lambda::LayerVersion
#   - AWS::IAM::Policy
#   - AWS::Cognito::UserPoolClient
#   - AWS::ApiGateway::Stage
#   - AWS::ApiGateway::Deployment
