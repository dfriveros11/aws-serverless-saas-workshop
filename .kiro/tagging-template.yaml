# AWS Serverless SaaS Workshop - Resource Tagging Template
# This file provides reusable tagging patterns for all workshop resources

# =============================================================================
# TAGGING STRATEGY
# =============================================================================
# All AWS resources created by the workshop should include standardized tags
# for cost tracking, resource management, and organizational purposes.
#
# Required Tags:
# - Application: serverless-saas-workshop (constant across all labs)
# - Lab: lab1, lab2, lab3, etc. (identifies which lab created the resource)
# - Environment: dev, staging, prod (deployment environment)
# - Owner: Email or identifier of resource owner
# - CostCenter: Cost allocation identifier
#
# Optional Tags (for tenant-specific resources):
# - TenantId: Unique identifier for the tenant
# - TenantTier: Basic, Standard, Premium, Platinum
#
# =============================================================================

# -----------------------------------------------------------------------------
# PARAMETERS SECTION
# Add these parameters to your SAM template to make tags configurable
# -----------------------------------------------------------------------------
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Deployment environment for the workshop

  Owner:
    Type: String
    Default: workshop-participant
    Description: Owner identifier for resource tracking

  CostCenter:
    Type: String
    Default: serverless-saas-workshop
    Description: Cost center for billing allocation

# -----------------------------------------------------------------------------
# TAGGING PATTERNS BY RESOURCE TYPE
# -----------------------------------------------------------------------------

# Pattern 1: Lambda Functions
# Apply to: AWS::Serverless::Function, AWS::Lambda::Function
# -----------------------------------------------------------------------------
LambdaFunctionExample:
  Type: AWS::Serverless::Function
  Properties:
    # ... other properties ...
    Tags:
      Application: serverless-saas-workshop
      Lab: !Sub "lab${LabNumber}"  # Use parameter or hardcode: lab1, lab2, etc.
      Environment: !Ref Environment
      Owner: !Ref Owner
      CostCenter: !Ref CostCenter
      # For tenant-specific functions, add:
      # TenantId: !Ref TenantId
      # TenantTier: !Ref TenantTier

# Pattern 2: DynamoDB Tables
# Apply to: AWS::DynamoDB::Table
# -----------------------------------------------------------------------------
DynamoDBTableExample:
  Type: AWS::DynamoDB::Table
  Properties:
    # ... other properties ...
    Tags:
      - Key: Application
        Value: serverless-saas-workshop
      - Key: Lab
        Value: lab1  # Change per lab: lab1, lab2, lab3, etc.
      - Key: Environment
        Value: !Ref Environment
      - Key: Owner
        Value: !Ref Owner
      - Key: CostCenter
        Value: !Ref CostCenter
      # For tenant-specific tables, add:
      # - Key: TenantId
      #   Value: !Ref TenantId
      # - Key: TenantTier
      #   Value: !Ref TenantTier

# Pattern 3: API Gateway REST APIs
# Apply to: AWS::Serverless::Api, AWS::ApiGateway::RestApi
# -----------------------------------------------------------------------------
ApiGatewayExample:
  Type: AWS::Serverless::Api
  Properties:
    # ... other properties ...
    Tags:
      Application: serverless-saas-workshop
      Lab: lab1  # Change per lab
      Environment: !Ref Environment
      Owner: !Ref Owner
      CostCenter: !Ref CostCenter

# Pattern 4: S3 Buckets
# Apply to: AWS::S3::Bucket
# -----------------------------------------------------------------------------
S3BucketExample:
  Type: AWS::S3::Bucket
  Properties:
    # ... other properties ...
    Tags:
      - Key: Application
        Value: serverless-saas-workshop
      - Key: Lab
        Value: lab1  # Change per lab
      - Key: Environment
        Value: !Ref Environment
      - Key: Owner
        Value: !Ref Owner
      - Key: CostCenter
        Value: !Ref CostCenter

# Pattern 5: Cognito User Pools
# Apply to: AWS::Cognito::UserPool
# -----------------------------------------------------------------------------
CognitoUserPoolExample:
  Type: AWS::Cognito::UserPool
  Properties:
    # ... other properties ...
    UserPoolTags:
      Application: serverless-saas-workshop
      Lab: lab1  # Change per lab
      Environment: !Ref Environment
      Owner: !Ref Owner
      CostCenter: !Ref CostCenter
      # For tenant-specific pools:
      # TenantId: !Ref TenantId
      # TenantTier: !Ref TenantTier

# Pattern 6: IAM Roles
# Apply to: AWS::IAM::Role
# Note: IAM roles support tags but they're applied differently
# -----------------------------------------------------------------------------
IAMRoleExample:
  Type: AWS::IAM::Role
  Properties:
    # ... other properties ...
    Tags:
      - Key: Application
        Value: serverless-saas-workshop
      - Key: Lab
        Value: lab1  # Change per lab
      - Key: Environment
        Value: !Ref Environment
      - Key: Owner
        Value: !Ref Owner
      - Key: CostCenter
        Value: !Ref CostCenter

# Pattern 7: Lambda Layers
# Apply to: AWS::Serverless::LayerVersion, AWS::Lambda::LayerVersion
# Note: Lambda layers don't support tags directly, but the functions using them do
# -----------------------------------------------------------------------------
LambdaLayerExample:
  Type: AWS::Serverless::LayerVersion
  Properties:
    # ... other properties ...
    # Lambda layers don't support Tags property
    # Tag the functions that use this layer instead

