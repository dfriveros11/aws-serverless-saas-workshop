AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Template to create dynamodb tables as part of bootstrap
Parameters:
  Environment:
    Type: String
    Description: "Environment name (dev, staging, prod)"
  Owner:
    Type: String
    Description: "Owner of the resources"
  CostCenter:
    Type: String
    Description: "Cost center for billing"
Resources:
  ServerlessSaaSSettingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: settingName
          AttributeType: S
      KeySchema:
        - AttributeName: settingName
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      TableName: ServerlessSaaS-Settings-lab5
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
  TenantStackMappingTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: tenantId
          AttributeType: S
      KeySchema:
        - AttributeName: tenantId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      TableName: ServerlessSaaS-TenantStackMapping-lab5
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
  TenantDetailsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: tenantId
          AttributeType: S
        - AttributeName: tenantName
          AttributeType: S
      KeySchema:
        - AttributeName: tenantId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      GlobalSecondaryIndexes:
        - IndexName: ServerlessSaas-TenantConfig-lab5
          KeySchema:
            - AttributeName: tenantName
              KeyType: HASH
          Projection:
            NonKeyAttributes:
              - userPoolId
              - appClientId
              - apiGatewayUrl
            ProjectionType: INCLUDE
      TableName: ServerlessSaaS-TenantDetails-lab5
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
  TenantUserMappingTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: tenantId
          AttributeType: S
        - AttributeName: userName
          AttributeType: S
      KeySchema:
        - AttributeName: tenantId
          KeyType: HASH
        - AttributeName: userName
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      TableName: ServerlessSaaS-TenantUserMapping-lab5
      GlobalSecondaryIndexes:
        - IndexName: UserName
          KeySchema:
            - AttributeName: userName
              KeyType: HASH
            - AttributeName: tenantId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
Outputs:
  ServerlessSaaSSettingsTableArn:
    Value: !GetAtt ServerlessSaaSSettingsTable.Arn
  ServerlessSaaSSettingsTableName:
    Value: !Ref ServerlessSaaSSettingsTable
  TenantStackMappingTableArn:
    Value: !GetAtt TenantStackMappingTable.Arn
  TenantStackMappingTableName:
    Value: !Ref TenantStackMappingTable
  TenantDetailsTableArn:
    Value: !GetAtt TenantDetailsTable.Arn
  TenantDetailsTableName:
    Value: !Ref TenantDetailsTable
  TenantUserMappingTableArn:
    Value: !GetAtt TenantUserMappingTable.Arn
  TenantUserMappingTableName:
    Value: !Ref TenantUserMappingTable