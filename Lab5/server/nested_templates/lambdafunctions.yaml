AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Template to deploy lambda functions as part of bootstrap
Parameters:
  CognitoOperationUsersUserPoolId:
    Type: String
  CognitoOperationUsersUserPoolClientId:
    Type: String
  CognitoUserPoolId:
    Type: String
  CognitoUserPoolClientId:
    Type: String
  TenantDetailsTableArn:
    Type: String
  ServerlessSaaSSettingsTableArn:
    Type: String
  TenantStackMappingTableArn:
    Type: String
  TenantUserMappingTableArn:
    Type: String
  TenantStackMappingTableName:
    Type: String
  TenantUserPoolCallbackURLParameter:
    Type: String
    Description: "Enter Tenant Management userpool call back url"
  Environment:
    Type: String
    Description: "Environment name (dev, staging, prod)"
  Owner:
    Type: String
    Description: "Owner of the resources"
  CostCenter:
    Type: String
    Description: "Cost center for billing"
Globals:
  Function:
    Timeout: 29
    Layers:
      - !Sub "arn:aws:lambda:${AWS::Region}:580247275435:layer:LambdaInsightsExtension:14"
    Environment:
      Variables:
        LOG_LEVEL: DEBUG
        POWERTOOLS_METRICS_NAMESPACE: "ServerlessSaaS"

Resources:
  # CloudWatch Log Groups with 60-day retention
  SharedServicesAuthorizerFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab5-shared-services-authorizer
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  CreateTenantAdminUserFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab5-create-tenant-admin-user
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  CreateUserFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab5-create-user
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  UpdateUserFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab5-update-user
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  DisableUserFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab5-disable-user
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  DisableUsersByTenantFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab5-disable-users-by-tenant
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  EnableUsersByTenantFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab5-enable-users-by-tenant
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  GetUserFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab5-get-user
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  GetUsersFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab5-get-users
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  CreateTenantFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab5-create-tenant
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  ActivateTenantFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab5-activate-tenant
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  GetTenantFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab5-get-tenant
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  DeactivateTenantFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab5-deactivate-tenant
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  UpdateTenantFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab5-update-tenant
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  GetTenantsFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab5-get-tenants
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  GetTenantConfigFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab5-get-tenant-config
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  RegisterTenantFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab5-register-tenant
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  ProvisionTenantFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab5-provision-tenant
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  DeProvisionTenantFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab5-de-provision-tenant
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  UpdateSettingsTableFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab5-update-settings-table
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  UpdateTenantStackMapTableFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab5-update-tenant-stack-map-table
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  ServerlessSaaSLayers:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: serverless-saas-dependencies-lab5
      Description: Utilities for project
      ContentUri: ../layers/
      CompatibleRuntimes:
        - python3.14
      LicenseInfo: "MIT"
      RetentionPolicy: Retain
    Metadata:
      BuildMethod: python3.14

  #Tenant Authorizer
  AuthorizerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: authorizer-execution-role-lab5
      Path: '/'
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchLambdaInsightsExecutionRolePolicy
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
      Policies:
        - PolicyName: authorizer-execution-policy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:List*
                Resource:
                  - !Sub arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/*
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource:
                  - !Ref TenantDetailsTableArn
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
  AuthorizerAccessRole:
    Type: AWS::IAM::Role
    DependsOn: AuthorizerExecutionRole
    Properties:
      RoleName: authorizer-access-role-lab5
      Path: '/'
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !GetAtt 'AuthorizerExecutionRole.Arn'
            Action:
              - sts:AssumeRole
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
      Policies:
        - PolicyName: authorizer-access-role-policy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:BatchGetItem
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/*
  SharedServicesAuthorizerFunction:
    Type: AWS::Serverless::Function
    DependsOn: AuthorizerAccessRole
    Properties:
      FunctionName: serverless-saas-lab5-shared-services-authorizer
      CodeUri: ../Resources/
      Handler: shared_service_authorizer.lambda_handler
      Runtime: python3.14
      Role: !GetAtt AuthorizerExecutionRole.Arn
      MemorySize: 256
      Tracing: Active
      Layers:
        - !Ref ServerlessSaaSLayers
      LoggingConfig:
        LogGroup: !Ref SharedServicesAuthorizerFunctionLogGroup
      Environment:
        Variables:
          OPERATION_USERS_USER_POOL: !Ref CognitoOperationUsersUserPoolId
          OPERATION_USERS_APP_CLIENT: !Ref CognitoOperationUsersUserPoolClientId
      Tags:
        Application: serverless-saas-workshop
        Lab: lab5
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter



  #Create user pool for the tenant
  TenantUserPoolLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: tenant-userpool-lambda-execution-role-lab5
      Path: "/"
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchLambdaInsightsExecutionRolePolicy
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
      Policies:
        - PolicyName: tenant-userpool-lambda-execution-policy-lab5
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:*
                Resource: "*"
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource:
                  - !Ref TenantDetailsTableArn
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource:
                  - !Ref TenantUserMappingTableArn
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
  CreateUserLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: create-user-lambda-execution-role-lab5
      Path: "/"
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchLambdaInsightsExecutionRolePolicy
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
      Policies:
        - PolicyName: create-user-lambda-execution-policy-lab5
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:*
                Resource: "*"
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource:
                  - !Ref TenantUserMappingTableArn
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource:
                  - !Ref TenantDetailsTableArn
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
  CreateTenantAdminUserFunction:
    Type: AWS::Serverless::Function
    DependsOn: CreateUserLambdaExecutionRole
    Properties:
      FunctionName: serverless-saas-lab5-create-tenant-admin-user
      CodeUri: ../TenantManagementService/
      Handler: user-management.create_tenant_admin_user
      Runtime: python3.14
      Role: !GetAtt CreateUserLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaaSLayers
      LoggingConfig:
        LogGroup: !Ref CreateTenantAdminUserFunctionLogGroup
      Environment:
        Variables:
          TENANT_USER_POOL_ID: !Ref CognitoUserPoolId
          TENANT_APP_CLIENT_ID: !Ref CognitoUserPoolClientId
          TENANT_USER_POOL_CALLBACK_URL: !Join ["",["https://",!Ref TenantUserPoolCallbackURLParameter, "/"]]
          POWERTOOLS_SERVICE_NAME: "UserManagement.CreateTenantAdmin"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab5
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter

  #User management
  CreateUserFunction:
    Type: AWS::Serverless::Function
    DependsOn: CreateUserLambdaExecutionRole
    Properties:
      FunctionName: serverless-saas-lab5-create-user
      CodeUri: ../TenantManagementService/
      Handler: user-management.create_user
      Runtime: python3.14
      Role: !GetAtt CreateUserLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaaSLayers
      LoggingConfig:
        LogGroup: !Ref CreateUserFunctionLogGroup
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "UserManagement.CreateUser"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab5
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter

  UpdateUserFunction:
    Type: AWS::Serverless::Function
    DependsOn: TenantUserPoolLambdaExecutionRole
    Properties:
      FunctionName: serverless-saas-lab5-update-user
      CodeUri: ../TenantManagementService/
      Handler: user-management.update_user
      Runtime: python3.14
      Role: !GetAtt TenantUserPoolLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaaSLayers
      LoggingConfig:
        LogGroup: !Ref UpdateUserFunctionLogGroup
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "UserManagement.UpdateUser"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab5
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter

  DisableUserFunction:
    Type: AWS::Serverless::Function
    DependsOn: TenantUserPoolLambdaExecutionRole
    Properties:
      FunctionName: serverless-saas-lab5-disable-user
      CodeUri: ../TenantManagementService/
      Handler: user-management.disable_user
      Runtime: python3.14
      Role: !GetAtt TenantUserPoolLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaaSLayers
      LoggingConfig:
        LogGroup: !Ref DisableUserFunctionLogGroup
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "UserManagement.DisableUser"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab5
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter

  DisableUsersByTenantFunction:
    Type: AWS::Serverless::Function
    DependsOn: TenantUserPoolLambdaExecutionRole
    Properties:
      FunctionName: serverless-saas-lab5-disable-users-by-tenant
      CodeUri: ../TenantManagementService/
      Handler: user-management.disable_users_by_tenant
      Runtime: python3.14
      Role: !GetAtt TenantUserPoolLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaaSLayers
      LoggingConfig:
        LogGroup: !Ref DisableUsersByTenantFunctionLogGroup
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "UserManagement.DisableUsersByTenant"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab5
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter

  EnableUsersByTenantFunction:
    Type: AWS::Serverless::Function
    DependsOn: TenantUserPoolLambdaExecutionRole
    Properties:
      FunctionName: serverless-saas-lab5-enable-users-by-tenant
      CodeUri: ../TenantManagementService/
      Handler: user-management.enable_users_by_tenant
      Runtime: python3.14
      Role: !GetAtt TenantUserPoolLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaaSLayers
      LoggingConfig:
        LogGroup: !Ref EnableUsersByTenantFunctionLogGroup
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "UserManagement.EnableUsersByTenant"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab5
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter

  GetUserFunction:
    Type: AWS::Serverless::Function
    DependsOn: TenantUserPoolLambdaExecutionRole
    Properties:
      FunctionName: serverless-saas-lab5-get-user
      CodeUri: ../TenantManagementService/
      Handler: user-management.get_user
      Runtime: python3.14
      Role: !GetAtt TenantUserPoolLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaaSLayers
      LoggingConfig:
        LogGroup: !Ref GetUserFunctionLogGroup
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "UserManagement.GetUser"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab5
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter

  GetUsersFunction:
    Type: AWS::Serverless::Function
    DependsOn: TenantUserPoolLambdaExecutionRole
    Properties:
      FunctionName: serverless-saas-lab5-get-users
      CodeUri: ../TenantManagementService/
      Handler: user-management.get_users
      Runtime: python3.14
      Role: !GetAtt TenantUserPoolLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaaSLayers
      LoggingConfig:
        LogGroup: !Ref GetUsersFunctionLogGroup
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "UserManagement.GetUsers"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab5
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter


  #Tenant Management
  TenantManagementLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: tenant-management-lambda-execution-role-lab5
      Path: "/"
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchLambdaInsightsExecutionRolePolicy
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
      Policies:
        - PolicyName: create-tenant-execution-policy-lab5
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource:
                  - !Ref TenantDetailsTableArn
                  - !Join ["", [!Ref TenantDetailsTableArn, '/index/*']]
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource:
                  - !Ref ServerlessSaaSSettingsTableArn
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
  CreateTenantFunction:
    Type: AWS::Serverless::Function
    DependsOn: TenantManagementLambdaExecutionRole
    Properties:
      FunctionName: serverless-saas-lab5-create-tenant
      CodeUri: ../TenantManagementService/
      Handler: tenant-management.create_tenant
      Runtime: python3.14
      Role: !GetAtt TenantManagementLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaaSLayers
      LoggingConfig:
        LogGroup: !Ref CreateTenantFunctionLogGroup
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "TenantManagement.CreateTenant"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab5
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter

  ActivateTenantFunction:
    Type: AWS::Serverless::Function
    DependsOn: TenantManagementLambdaExecutionRole
    Properties:
      FunctionName: serverless-saas-lab5-activate-tenant
      CodeUri: ../TenantManagementService/
      Handler: tenant-management.activate_tenant
      Runtime: python3.14
      Role: !GetAtt TenantManagementLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaaSLayers
      LoggingConfig:
        LogGroup: !Ref ActivateTenantFunctionLogGroup
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "TenantManagement.ActivateTenant"
          ENABLE_USERS_BY_TENANT: "/users/enable"
          PROVISION_TENANT: "/provisioning/"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab5
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter

  GetTenantFunction:
    Type: AWS::Serverless::Function
    DependsOn: TenantManagementLambdaExecutionRole
    Properties:
      FunctionName: serverless-saas-lab5-get-tenant
      CodeUri: ../TenantManagementService/
      Handler: tenant-management.get_tenant
      Runtime: python3.14
      Role: !GetAtt TenantManagementLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaaSLayers
      LoggingConfig:
        LogGroup: !Ref GetTenantFunctionLogGroup
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "TenantManagement.GetTenant"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab5
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter

  DeactivateTenantFunction:
    Type: AWS::Serverless::Function
    DependsOn: TenantManagementLambdaExecutionRole
    Properties:
      FunctionName: serverless-saas-lab5-deactivate-tenant
      CodeUri: ../TenantManagementService/
      Handler: tenant-management.deactivate_tenant
      Runtime: python3.14
      Role: !GetAtt TenantManagementLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaaSLayers
      LoggingConfig:
        LogGroup: !Ref DeactivateTenantFunctionLogGroup
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "TenantManagement.DeactivateTenant"
          DEPROVISION_TENANT: "/provisioning/"
          DISABLE_USERS_BY_TENANT: "/users/disable"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab5
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter

  UpdateTenantFunction:
    Type: AWS::Serverless::Function
    DependsOn: TenantManagementLambdaExecutionRole
    Properties:
      FunctionName: serverless-saas-lab5-update-tenant
      CodeUri: ../TenantManagementService/
      Handler: tenant-management.update_tenant
