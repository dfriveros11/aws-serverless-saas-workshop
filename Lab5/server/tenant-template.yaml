  UpdateTenantApiGatewayUrlLambdaExecutionRole:
    Type: AWS::IAM::Role
    DependsOn: ApiGatewayTenantApi
    Properties:
      RoleName: !Join ['-', [!Ref TenantIdParameter, apigw-url-lab5]]
      Path: "/"
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchLambdaInsightsExecutionRolePolicy
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
      Policies:
        - PolicyName: !Join ['-', [!Ref TenantIdParameter, apigwurl-lambda-exe-policy ]]
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/ServerlessSaaS-Settings-lab5 
              - Effect: Allow
                Action:
                  - dynamodb:UpdateItem
                Resource: !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/ServerlessSaaS-TenantDetails-lab5
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: TenantId
          Value: !Ref TenantIdParameter
        - Key: Lab
          Value: lab5
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter    
  UpdateTenantApiGatewayUrlFunction:
    Type: AWS::Serverless::Function
    DependsOn: UpdateTenantApiGatewayUrlLambdaExecutionRole
    Properties:
      FunctionName: !Sub 'update-apigw-lab5-${TenantIdParameter}'
      CodeUri: custom_resources/
      Handler: update_tenant_apigatewayurl.handler
      Runtime: python3.14
      Role: !GetAtt UpdateTenantApiGatewayUrlLambdaExecutionRole.Arn
      Layers: 
          - !Ref ServerlessSaaSLayers
      LoggingConfig:
        LogGroup: !Ref UpdateTenantApiGatewayUrlFunctionLogGroup
      Tags:
        Application: serverless-saas-workshop
        TenantId: !Ref TenantIdParameter
        Lab: lab5
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
  UpdateTenantApiGatewayUrl:
    Type: Custom::UpdateTenantApiGatewayUrl
    DependsOn: UpdateTenantApiGatewayUrlFunction
    Properties:
      ServiceToken: !GetAtt UpdateTenantApiGatewayUrlFunction.Arn
      TenantDetailsTableName: ServerlessSaaS-TenantDetails-lab5
      SettingsTableName: ServerlessSaaS-Settings-lab5  
      TenantId: !Ref TenantIdParameter  
      TenantApiGatewayUrl: !Sub "https://${ApiGatewayTenantApi}.execute-api.${AWS::Region}.amazonaws.com/prod/"
      ServiceTimeout: 300
  
Outputs:
  TenantApiGatewayId:
    Description: Id for Tenant API Gateway
    Value: !Ref ApiGatewayTenantApi
  TenantAPI:
    Description: "API Gateway endpoint URL for Tenant API"
    Value: !Join ['', [!Sub "https://${ApiGatewayTenantApi}.execute-api.${AWS::Region}.amazonaws.com/", !Ref StageName]]