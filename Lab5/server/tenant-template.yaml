AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Serverless SaaS Reference Architecture 

Globals:
  Function:
    Timeout: 29
    Layers:
      - !Sub "arn:aws:lambda:${AWS::Region}:580247275435:layer:LambdaInsightsExtension:14"
    Environment:
        Variables:
          LOG_LEVEL: DEBUG         
          POWERTOOLS_METRICS_NAMESPACE: "ServerlessSaaS"
          
Parameters:
  TenantIdParameter:
    Type: String
    Default: pooled
    Description: Tenant ID for the stack
  StageName:
    Type: String
    Default: "prod"
    Description: "Stage Name for the api"
  Environment:
    Type: String
    Description: "Environment name (dev, staging, prod)"
  Owner:
    Type: String
    Description: "Owner of the resources"
  CostCenter:
    Type: String
    Description: "Cost center for billing"
Conditions:
  IsPooledDeploy: !Equals [ !Ref TenantIdParameter, pooled]
  IsSiloDeploy: !Not [!Equals [ !Ref TenantIdParameter, pooled]]    
Resources: 


  # CloudWatch Log Groups with 60-day retention
  GetProductFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AWS::StackName}-GetProductFunction
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  GetProductsFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AWS::StackName}-GetProductsFunction
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  CreateProductFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AWS::StackName}-CreateProductFunction
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  UpdateProductFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AWS::StackName}-UpdateProductFunction
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  DeleteProductFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AWS::StackName}-DeleteProductFunction
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  GetOrdersFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AWS::StackName}-GetOrdersFunction
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  GetOrderFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AWS::StackName}-GetOrderFunction
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  CreateOrderFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AWS::StackName}-CreateOrderFunction
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  UpdateOrderFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AWS::StackName}-UpdateOrderFunction
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  DeleteOrderFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AWS::StackName}-DeleteOrderFunction
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  BusinessServicesAuthorizerFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AWS::StackName}-BusinessServicesAuthorizerFunction
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  UpdateTenantApiGatewayUrlFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AWS::StackName}-UpdateTenantApiGatewayUrlFunction
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5

  ServerlessSaaSLayers:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Join ['-', [serverless-saas-dependencies, !Ref TenantIdParameter, lab5]]
      Description: Utilities for project
      ContentUri: layers/
      CompatibleRuntimes:
        - python3.14          
      LicenseInfo: 'MIT'
      RetentionPolicy: Retain      
    Metadata:
      BuildMethod: python3.14   
  
  ProductTable:
    Type: AWS::DynamoDB::Table
    Properties: 
      AttributeDefinitions:
        - AttributeName: shardId
          AttributeType: S          
        - AttributeName: productId
          AttributeType: S          
      KeySchema:
        - AttributeName: shardId
          KeyType: HASH  
        - AttributeName: productId
          KeyType: RANGE  
      ProvisionedThroughput: 
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5
      TableName: !Join ['-', [Product, !Ref TenantIdParameter, lab5]]
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
        - Key: TenantId
          Value: !Ref TenantIdParameter

  OrderTable:
    Type: AWS::DynamoDB::Table
    Properties: 
      AttributeDefinitions:
        - AttributeName: shardId
          AttributeType: S 
        - AttributeName: orderId
          AttributeType: S          
      KeySchema:
        - AttributeName: shardId
          KeyType: HASH 
        - AttributeName: orderId
          KeyType: RANGE  
      ProvisionedThroughput: 
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5
      TableName: !Join ['-', [Order, !Ref TenantIdParameter, lab5]]
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
        - Key: TenantId
          Value: !Ref TenantIdParameter

  ProductFunctionExecutionRolePolicy:
    Condition: IsSiloDeploy
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Join ['-', [!Ref TenantIdParameter, product-function-policy]]
      Roles: 
        - !Ref ProductFunctionExecutionRole
      PolicyDocument:
        Version: 2012-10-17
        Statement:              
          - Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:UpdateItem
              - dynamodb:PutItem
              - dynamodb:DeleteItem
              - dynamodb:Query
            Resource:
              - !GetAtt ProductTable.Arn

  ProductFunctionExecutionRole:
    Type: AWS::IAM::Role     
    Properties:
      RoleName: !Join ['-', [!Ref TenantIdParameter, prod-lab5]]
      Path: '/'
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns: 
        - arn:aws:iam::aws:policy/CloudWatchLambdaInsightsExecutionRolePolicy    
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
        - Key: TenantId
          Value: !Ref TenantIdParameter
             
  GetProductFunction:
    Type: AWS::Serverless::Function 
    DependsOn: ProductFunctionExecutionRole 
    Properties:
      FunctionName: !Sub 'get-prod-lab5-${TenantIdParameter}'
      CodeUri: ProductService/
      Handler: product_service.get_product
      Runtime: python3.14  
      Tracing: Active
      Role: !GetAtt ProductFunctionExecutionRole.Arn
      Layers: 
        - !Ref ServerlessSaaSLayers
      LoggingConfig:
        LogGroup: !Ref GetProductFunctionLogGroup
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "ProductService"
          IS_POOLED_DEPLOY: !If [IsPooledDeploy, true, false]
          PRODUCT_TABLE_NAME: !Ref ProductTable      
      Tags:
        Application: serverless-saas-workshop
        Lab: lab5
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
        TenantId: !Ref TenantIdParameter

  GetProductsFunction:
    Type: AWS::Serverless::Function 
    DependsOn: ProductFunctionExecutionRole 
    Properties:
      FunctionName: !Sub 'get-prods-lab5-${TenantIdParameter}'
      CodeUri: ProductService/
      Handler: product_service.get_products
      Runtime: python3.14  
      Tracing: Active
      Role: !GetAtt ProductFunctionExecutionRole.Arn
      Layers: 
        - !Ref ServerlessSaaSLayers
      LoggingConfig:
        LogGroup: !Ref GetProductsFunctionLogGroup
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "ProductService"
          IS_POOLED_DEPLOY: !If [IsPooledDeploy, true, false]
          PRODUCT_TABLE_NAME: !Ref ProductTable
      Tags:
        Application: serverless-saas-workshop
        Lab: lab5
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
        TenantId: !Ref TenantIdParameter

  CreateProductFunction:
    Type: AWS::Serverless::Function
    DependsOn: ProductFunctionExecutionRole 
    Properties:
      FunctionName: !Sub 'create-prod-lab5-${TenantIdParameter}'
      CodeUri: ProductService/
      Handler: product_service.create_product
      Runtime: python3.14  
      Tracing: Active 
      Role: !GetAtt ProductFunctionExecutionRole.Arn 
      Layers: 
        - !Ref ServerlessSaaSLayers
      LoggingConfig:
        LogGroup: !Ref CreateProductFunctionLogGroup
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "ProductService"
          IS_POOLED_DEPLOY: !If [IsPooledDeploy, true, false]
          PRODUCT_TABLE_NAME: !Ref ProductTable
      Tags:
        Application: serverless-saas-workshop
        Lab: lab5
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
        TenantId: !Ref TenantIdParameter

  UpdateProductFunction:
    Type: AWS::Serverless::Function
    DependsOn: ProductFunctionExecutionRole 
    Properties:
      FunctionName: !Sub 'update-prod-lab5-${TenantIdParameter}'
      CodeUri: ProductService/
      Handler: product_service.update_product
      Runtime: python3.14 
      Tracing: Active
      Role: !GetAtt ProductFunctionExecutionRole.Arn 
      Layers: 
        - !Ref ServerlessSaaSLayers
      LoggingConfig:
        LogGroup: !Ref UpdateProductFunctionLogGroup
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "ProductService"
          IS_POOLED_DEPLOY: !If [IsPooledDeploy, true, false]
          PRODUCT_TABLE_NAME: !Ref ProductTable
      Tags:
        Application: serverless-saas-workshop
        Lab: lab5
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
        TenantId: !Ref TenantIdParameter

  DeleteProductFunction:
    Type: AWS::Serverless::Function
    DependsOn: ProductFunctionExecutionRole 
    Properties:
      FunctionName: !Sub 'delete-prod-lab5-${TenantIdParameter}'
      CodeUri: ProductService/
      Handler: product_service.delete_product
      Runtime: python3.14 
      Tracing: Active
      Role: !GetAtt ProductFunctionExecutionRole.Arn 
      Layers: 
        - !Ref ServerlessSaaSLayers
      LoggingConfig:
        LogGroup: !Ref DeleteProductFunctionLogGroup
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "ProductService"
          IS_POOLED_DEPLOY: !If [IsPooledDeploy, true, false]
          PRODUCT_TABLE_NAME: !Ref ProductTable
      Tags:
        Application: serverless-saas-workshop
        Lab: lab5
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
        TenantId: !Ref TenantIdParameter

  OrderFunctionExecutionRolePolicy:
    Condition: IsSiloDeploy
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Join ['-', [!Ref TenantIdParameter, order-function-policy]]
      Roles: 
        - !Ref OrderFunctionExecutionRole
      PolicyDocument:
        Version: 2012-10-17
        Statement:              
          - Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:UpdateItem
              - dynamodb:PutItem
              - dynamodb:DeleteItem
              - dynamodb:Query
            Resource:
              - !GetAtt OrderTable.Arn

  OrderFunctionExecutionRole:
    Type: AWS::IAM::Role     
    Properties:
      RoleName: !Join ['-', [!Ref TenantIdParameter, order-lab5]]
      Path: '/'
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns: 
        - arn:aws:iam::aws:policy/CloudWatchLambdaInsightsExecutionRolePolicy    
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
        - Key: TenantId
          Value: !Ref TenantIdParameter
                
  GetOrdersFunction:
    Type: AWS::Serverless::Function 
    DependsOn: OrderFunctionExecutionRole 
    Properties:
      FunctionName: !Sub 'get-orders-lab5-${TenantIdParameter}'
      CodeUri: OrderService/
      Handler: order_service.get_orders
      Runtime: python3.14  
      Tracing: Active
      Role: !GetAtt OrderFunctionExecutionRole.Arn
      Layers: 
        - !Ref ServerlessSaaSLayers
      LoggingConfig:
        LogGroup: !Ref GetOrdersFunctionLogGroup
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "OrderService"
          IS_POOLED_DEPLOY: !If [IsPooledDeploy, true, false]
          ORDER_TABLE_NAME: !Ref OrderTable
      Tags:
        Application: serverless-saas-workshop
        Lab: lab5
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
        TenantId: !Ref TenantIdParameter

  GetOrderFunction:
    Type: AWS::Serverless::Function 
    DependsOn: OrderFunctionExecutionRole 
    Properties:
      FunctionName: !Sub 'get-order-lab5-${TenantIdParameter}'
      CodeUri: OrderService/
      Handler: order_service.get_order
      Runtime: python3.14  
      Tracing: Active
      Role: !GetAtt OrderFunctionExecutionRole.Arn
      Layers: 
        - !Ref ServerlessSaaSLayers
      LoggingConfig:
        LogGroup: !Ref GetOrderFunctionLogGroup
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "OrderService"
          IS_POOLED_DEPLOY: !If [IsPooledDeploy, true, false]
          ORDER_TABLE_NAME: !Ref OrderTable
      Tags:
        Application: serverless-saas-workshop
        Lab: lab5
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
        TenantId: !Ref TenantIdParameter

  CreateOrderFunction:
    Type: AWS::Serverless::Function
    DependsOn: OrderFunctionExecutionRole 
    Properties:
      FunctionName: !Sub 'create-order-lab5-${TenantIdParameter}'
      CodeUri: OrderService/
      Handler: order_service.create_order
      Runtime: python3.14  
      Tracing: Active 
      Role: !GetAtt OrderFunctionExecutionRole.Arn 
      Layers: 
        - !Ref ServerlessSaaSLayers
      LoggingConfig:
        LogGroup: !Ref CreateOrderFunctionLogGroup
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "OrderService"
          IS_POOLED_DEPLOY: !If [IsPooledDeploy, true, false]
          ORDER_TABLE_NAME: !Ref OrderTable
      Tags:
        Application: serverless-saas-workshop
        Lab: lab5
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
        TenantId: !Ref TenantIdParameter

  UpdateOrderFunction:
    Type: AWS::Serverless::Function
    DependsOn: OrderFunctionExecutionRole 
    Properties:
      FunctionName: !Sub 'update-order-lab5-${TenantIdParameter}'
      CodeUri: OrderService/
      Handler: order_service.update_order
      Runtime: python3.14 
      Tracing: Active
      Role: !GetAtt OrderFunctionExecutionRole.Arn 
      Layers: 
        - !Ref ServerlessSaaSLayers
      LoggingConfig:
        LogGroup: !Ref UpdateOrderFunctionLogGroup
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "OrderService"
          IS_POOLED_DEPLOY: !If [IsPooledDeploy, true, false]
          ORDER_TABLE_NAME: !Ref OrderTable
      Tags:
        Application: serverless-saas-workshop
        Lab: lab5
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
        TenantId: !Ref TenantIdParameter

  DeleteOrderFunction:
    Type: AWS::Serverless::Function
    DependsOn: OrderFunctionExecutionRole 
    Properties:
      FunctionName: !Sub 'delete-order-lab5-${TenantIdParameter}'
      CodeUri: OrderService/
      Handler: order_service.delete_order
      Runtime: python3.14 
      Tracing: Active
      Role: !GetAtt OrderFunctionExecutionRole.Arn 
      Layers: 
        - !Ref ServerlessSaaSLayers
      LoggingConfig:
        LogGroup: !Ref DeleteOrderFunctionLogGroup
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "OrderService"
          IS_POOLED_DEPLOY: !If [IsPooledDeploy, true, false]
          ORDER_TABLE_NAME: !Ref OrderTable
      Tags:
        Application: serverless-saas-workshop
        Lab: lab5
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
        TenantId: !Ref TenantIdParameter
        
  BusinessServicesAuthorizerFunction:
    Type: AWS::Serverless::Function 
    Properties:
      FunctionName: !Sub 'authorizer-lab5-${TenantIdParameter}'
      CodeUri: Resources/
      Handler: tenant_authorizer.lambda_handler
      Runtime: python3.14
      Role: !ImportValue Serverless-SaaS-AuthorizerExecutionRoleArn-lab5
      MemorySize: 256
      Tracing: Active
      Layers: 
        - !Ref ServerlessSaaSLayers
      LoggingConfig:
        LogGroup: !Ref BusinessServicesAuthorizerFunctionLogGroup
      Tags:
        Application: serverless-saas-workshop
        TenantId: !Ref TenantIdParameter
        Lab: lab5
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
      Environment:
        Variables:
          OPERATION_USERS_USER_POOL: !ImportValue Serverless-SaaS-CognitoOperationUsersUserPoolId-lab5
          OPERATION_USERS_APP_CLIENT: !ImportValue Serverless-SaaS-CognitoOperationUsersUserPoolClientId-lab5
          
  ApiGatewayAccessLogs:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Join ['-', [/aws/api-gateway/access-logs-serverless-saas-lab5-tenant-api-, !Ref TenantIdParameter]]
      RetentionInDays: 60
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab5
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
        - Key: TenantId
          Value: !Ref TenantIdParameter
  ApiGatewayTenantApi:
    Type: AWS::Serverless::Api
    Properties:
      Tags:
        Application: serverless-saas-workshop
        Lab: lab5
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
        TenantId: !Ref TenantIdParameter
      MethodSettings:
        - DataTraceEnabled: False
          LoggingLevel: INFO
          MetricsEnabled: True
          ResourcePath: '/*' 
          HttpMethod: '*' 
      AccessLogSetting:
        DestinationArn: !GetAtt ApiGatewayAccessLogs.Arn
        Format: '{ "requestId":"$context.requestId", "ip": "$context.identity.sourceIp", "caller":"$context.identity.caller", "user":"$context.identity.user","requestTime":"$context.requestTime", "httpMethod":"$context.httpMethod","resourcePath":"$context.resourcePath", "status":"$context.status","protocol":"$context.protocol", "responseLength":"$context.responseLength" }'
      TracingEnabled: True
      DefinitionBody:
        openapi: 3.0.1
        info:
          title: !Join ['-', [!Ref TenantIdParameter, 'serverless-saas-tenant-api']]
        basePath: !Join ['', ['/', !Ref StageName]]
        x-amazon-apigateway-api-key-source : "AUTHORIZER"
        schemes:
          - https
        paths:
          /order/{id}:
            get:
              summary: Returns a order
              description: Return a order by a order id.
              produces:
                - application/json
              parameters:
                - name: id
                  in: path
                  required: true
                  type: string
              responses: {}
              security:        
                - Authorizer: []
              x-amazon-apigateway-integration:
                uri: !Join
                  - ''
                  - - !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/
                    -  !GetAtt GetOrderFunction.Arn
                    - /invocations
                httpMethod: POST
                type: aws_proxy 
            put:              
              produces:
                - application/json
              responses: {}
              security:      
                - Authorizer: []
              x-amazon-apigateway-integration:
                uri: !Join
                  - ''
                  - - !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/
                    -  !GetAtt UpdateOrderFunction.Arn
                    - /invocations
                httpMethod: POST
                type: aws_proxy     
            delete:
              summary: Deletes a order
              description: Deletes a order by a order id.
              produces:
                - application/json
              parameters:
                - name: id
                  in: path
                  required: true
                  type: string
              responses: {}
              security:       
                - Authorizer: []
              x-amazon-apigateway-integration:
                uri: !Join
                  - ''
                  - - !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/
                    -  !GetAtt DeleteOrderFunction.Arn
                    - /invocations
                httpMethod: POST
                type: aws_proxy
            options:
              consumes:
                - application/json
              produces:
                - application/json
              responses:
                '200':
                  description: 200 response
                  schema:
                    $ref: "#/definitions/Empty"
                  headers:
                    Access-Control-Allow-Origin:
                      type: string
                    Access-Control-Allow-Methods:
                      type: string
                    Access-Control-Allow-Headers:
                      type: string
              x-amazon-apigateway-integration:
                responses:
                  default:
                    statusCode: 200
                    responseParameters:
                      method.response.header.Access-Control-Allow-Methods: "'DELETE,GET,HEAD,OPTIONS,PATCH,POST,PUT'"
                      method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
                      method.response.header.Access-Control-Allow-Origin:  "'*'"
                passthroughBehavior: when_no_match
                requestTemplates:
                  application/json: "{\"statusCode\": 200}"
                type: mock      
          /orders:
            get:
              summary: Returns all orders
              description: Returns all orders.
              produces:
                - application/json
              responses: {}
              security:     
                - Authorizer: []
              x-amazon-apigateway-integration:
                uri: !Join
                  - ''
                  - - !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/
                    -  !GetAtt GetOrdersFunction.Arn
                    - /invocations
                httpMethod: POST
                type: aws_proxy
            options:
              consumes:
                - application/json
              produces:
                - application/json
              responses:
                '200':
                  description: 200 response
                  schema:
                    $ref: "#/definitions/Empty"
                  headers:
                    Access-Control-Allow-Origin:
                      type: string
                    Access-Control-Allow-Methods:
                      type: string
                    Access-Control-Allow-Headers:
                      type: string
              x-amazon-apigateway-integration:
                responses:
                  default:
                    statusCode: 200
                    responseParameters:
                      method.response.header.Access-Control-Allow-Methods: "'DELETE,GET,HEAD,OPTIONS,PATCH,POST,PUT'"
                      method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
                      method.response.header.Access-Control-Allow-Origin:  "'*'"
                passthroughBehavior: when_no_match
                requestTemplates:
                  application/json: "{\"statusCode\": 200}"
                type: mock                              
          /order:
            post:              
              produces:
                - application/json
              responses: {}
              security:         
                - Authorizer: []
              x-amazon-apigateway-integration:
                uri: !Join
                  - ''
