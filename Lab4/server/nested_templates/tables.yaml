AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Template to create dynamodb tables as part of bootstrap
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment for the workshop

  Owner:
    Type: String
    Default: workshop-participant
    Description: Owner identifier for resource tracking

  CostCenter:
    Type: String
    Default: serverless-saas-workshop
    Description: Cost center for billing allocation

Resources:
  TenantDetailsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: tenantId
          AttributeType: S
        - AttributeName: tenantName
          AttributeType: S   
      KeySchema:
        - AttributeName: tenantId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST 
      GlobalSecondaryIndexes:
        - IndexName: ServerlessSaas-TenantConfig
          KeySchema:
            - AttributeName: tenantName
              KeyType: HASH
          Projection:
            NonKeyAttributes: 
              - userPoolId
              - appClientId
              - apiGatewayUrl
            ProjectionType: INCLUDE              
      TableName: ServerlessSaaS-TenantDetails-lab4
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab4
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
  TenantUserMappingTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: tenantId
          AttributeType: S
        - AttributeName: userName
          AttributeType: S
      KeySchema:
        - AttributeName: tenantId
          KeyType: HASH
        - AttributeName: userName
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST 
      TableName: ServerlessSaaS-TenantUserMapping-lab4
      GlobalSecondaryIndexes: 
        - IndexName: UserName
          KeySchema: 
            - AttributeName: userName
              KeyType: HASH
            - AttributeName: tenantId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab4
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter          
Outputs:
  TenantDetailsTableArn: 
    Value: !GetAtt TenantDetailsTable.Arn
  TenantDetailsTableName: 
    Value: !Ref TenantDetailsTable
  TenantUserMappingTableArn: 
    Value: !GetAtt TenantUserMappingTable.Arn
  TenantUserMappingTableName: 
    Value: !Ref TenantUserMappingTable