AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Template to deploy lambda functions as part of bootstrap
Parameters:
  CognitoOperationUsersUserPoolId:
    Type: String
  CognitoOperationUsersUserPoolClientId:
    Type: String
  CognitoUserPoolId: 
    Type: String
  CognitoUserPoolClientId: 
    Type: String  
  TenantDetailsTableArn:
    Type: String
  TenantUserMappingTableArn:
    Type: String
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment for the workshop
  Owner:
    Type: String
    Default: workshop-participant
    Description: Owner identifier for resource tracking
  CostCenter:
    Type: String
    Default: serverless-saas-workshop
    Description: Cost center for billing allocation  
Globals:
  Function:
    Timeout: 29
    Layers:
      - !Sub "arn:aws:lambda:${AWS::Region}:580247275435:layer:LambdaInsightsExtension:14"
    Environment:
      Variables:
        LOG_LEVEL: DEBUG        
        POWERTOOLS_METRICS_NAMESPACE: "ServerlessSaas-lab2"
        
Resources:

  # CloudWatch Log Groups - CloudFormation creates them, post-deployment script adds retention/tags
  SharedServicesAuthorizerFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab2-authorizer

  CreateTenantAdminUserFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab2-create-tenant-admin-user

  CreateUserFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab2-create-user

  UpdateUserFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab2-update-user

  DisableUserFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab2-disable-user

  DisableUsersByTenantFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab2-disable-users-by-tenant

  EnableUsersByTenantFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab2-enable-users-by-tenant

  GetUserFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab2-get-user

  GetUsersFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab2-get-users

  CreateTenantFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab2-create-tenant

  ActivateTenantFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab2-activate-tenant

  GetTenantFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab2-get-tenant

  DeactivateTenantFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab2-deactivate-tenant

  UpdateTenantFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab2-update-tenant

  GetTenantsFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab2-get-tenants

  RegisterTenantFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab2-register-tenant

  ServerlessSaasLab2Layers:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: serverless-saas-lab2-dependencies
      Description: Utilities for project
      ContentUri: ../layers/
      CompatibleRuntimes:
        - python3.14
      LicenseInfo: "MIT"
      RetentionPolicy: Retain
    Metadata:
      BuildMethod: python3.14

  
  AuthorizerExecutionRole:
    Type: AWS::IAM::Role     
    Properties:
      RoleName: serverless-saas-lab2-authorizer-exec-role
      Path: '/'
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns: 
        - arn:aws:iam::aws:policy/CloudWatchLambdaInsightsExecutionRolePolicy    
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess   
      Policies:      
        - PolicyName: serverless-saas-lab2-authorizer-exec-policy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:List*                                    
                Resource:
                  - !Sub arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/*    
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource:
                  - !Ref TenantDetailsTableArn
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab2
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter    
  
  SharedServicesAuthorizerFunction:
    Type: AWS::Serverless::Function 
    DependsOn: 
      - AuthorizerExecutionRole
      - SharedServicesAuthorizerFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab2-authorizer
      CodeUri: ../Resources/
      Handler: shared_service_authorizer.lambda_handler
      Runtime: python3.14
      Role: !GetAtt AuthorizerExecutionRole.Arn
      MemorySize: 256
      Tracing: Active
      Layers: 
        - !Ref ServerlessSaasLab2Layers
      Environment:
        Variables:
          OPERATION_USERS_USER_POOL: !Ref CognitoOperationUsersUserPoolId
          OPERATION_USERS_APP_CLIENT: !Ref CognitoOperationUsersUserPoolClientId
      Tags:
        Application: serverless-saas-workshop
        Lab: lab2
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter          
          
  #Create user pool for the tenant
  TenantUserPoolLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub serverless-saas-lab2-userpool-exec-role-${AWS::Region}
      Path: "/"
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns: 
        - arn:aws:iam::aws:policy/CloudWatchLambdaInsightsExecutionRolePolicy    
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
      Policies:
        - PolicyName: !Sub serverless-saas-lab2-userpool-exec-policy-${AWS::Region}
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:*
                Resource: "*"
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource:
                  - !Ref TenantDetailsTableArn
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource:
                  - !Ref TenantUserMappingTableArn
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab2
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
  CreateUserLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub serverless-saas-lab2-create-user-exec-role-${AWS::Region}
      Path: "/"
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole          
      ManagedPolicyArns: 
        - arn:aws:iam::aws:policy/CloudWatchLambdaInsightsExecutionRolePolicy    
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
      Policies:
        - PolicyName: !Sub serverless-saas-lab2-create-user-exec-policy-${AWS::Region}
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:*
                Resource: "*"
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource:
                  - !Ref TenantUserMappingTableArn
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource:
                  - !Ref TenantDetailsTableArn
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab2
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
  CreateTenantAdminUserFunction:
    Type: AWS::Serverless::Function
    DependsOn: 
      - CreateUserLambdaExecutionRole
      - CreateTenantAdminUserFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab2-create-tenant-admin-user
      CodeUri: ../TenantManagementService/
      Handler: user-management.create_tenant_admin_user
      Runtime: python3.14
      Role: !GetAtt CreateUserLambdaExecutionRole.Arn      
      Tracing: Active
      Layers:
        - !Ref ServerlessSaasLab2Layers
      Environment:
        Variables:
          TENANT_USER_POOL_ID: !Ref CognitoUserPoolId
          TENANT_APP_CLIENT_ID: !Ref CognitoUserPoolClientId
          POWERTOOLS_SERVICE_NAME: "UserManagement.CreateTenantAdmin"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab2
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
      
  #User management
  CreateUserFunction:
    Type: AWS::Serverless::Function
    DependsOn: 
      - CreateUserLambdaExecutionRole
      - CreateUserFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab2-create-user
      CodeUri: ../TenantManagementService/
      Handler: user-management.create_user
      Runtime: python3.14
      Role: !GetAtt CreateUserLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaasLab2Layers
      Environment:
        Variables:
          TENANT_USER_POOL_ID: !Ref CognitoUserPoolId
          POWERTOOLS_SERVICE_NAME: "UserManagement.CreateUser"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab2
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter   
      

  UpdateUserFunction:
    Type: AWS::Serverless::Function
    DependsOn: 
      - TenantUserPoolLambdaExecutionRole
      - UpdateUserFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab2-update-user
      CodeUri: ../TenantManagementService/
      Handler: user-management.update_user
      Runtime: python3.14
      Role: !GetAtt TenantUserPoolLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaasLab2Layers
      Environment:
        Variables:
          TENANT_USER_POOL_ID: !Ref CognitoUserPoolId
          POWERTOOLS_SERVICE_NAME: "UserManagement.UpdateUser"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab2
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
      
  DisableUserFunction:
    Type: AWS::Serverless::Function
    DependsOn: 
      - TenantUserPoolLambdaExecutionRole
      - DisableUserFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab2-disable-user
      CodeUri: ../TenantManagementService/
      Handler: user-management.disable_user
      Runtime: python3.14
      Role: !GetAtt TenantUserPoolLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaasLab2Layers
      Environment:
        Variables:
          TENANT_USER_POOL_ID: !Ref CognitoUserPoolId
          POWERTOOLS_SERVICE_NAME: "UserManagement.DisableUser"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab2
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
      
  DisableUsersByTenantFunction:
    Type: AWS::Serverless::Function
    DependsOn: 
      - TenantUserPoolLambdaExecutionRole
      - DisableUsersByTenantFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab2-disable-users-by-tenant
      CodeUri: ../TenantManagementService/
      Handler: user-management.disable_users_by_tenant
      Runtime: python3.14
      Role: !GetAtt TenantUserPoolLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaasLab2Layers
      Environment:
        Variables:
          TENANT_USER_POOL_ID: !Ref CognitoUserPoolId
          POWERTOOLS_SERVICE_NAME: "UserManagement.DisableUsersByTenant"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab2
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
           
  EnableUsersByTenantFunction:
    Type: AWS::Serverless::Function
    DependsOn: 
      - TenantUserPoolLambdaExecutionRole
      - EnableUsersByTenantFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab2-enable-users-by-tenant
      CodeUri: ../TenantManagementService/
      Handler: user-management.enable_users_by_tenant
      Runtime: python3.14
      Role: !GetAtt TenantUserPoolLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaasLab2Layers
      Environment:
        Variables:
          TENANT_USER_POOL_ID: !Ref CognitoUserPoolId
          POWERTOOLS_SERVICE_NAME: "UserManagement.EnableUsersByTenant"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab2
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
      
  GetUserFunction:
    Type: AWS::Serverless::Function
    DependsOn: 
      - TenantUserPoolLambdaExecutionRole
      - GetUserFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab2-get-user
      CodeUri: ../TenantManagementService/
      Handler: user-management.get_user
      Runtime: python3.14
      Role: !GetAtt TenantUserPoolLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaasLab2Layers
      Environment:
        Variables:
          TENANT_USER_POOL_ID: !Ref CognitoUserPoolId
          POWERTOOLS_SERVICE_NAME: "UserManagement.GetUser"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab2
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
         
  GetUsersFunction:
    Type: AWS::Serverless::Function
    DependsOn: 
      - TenantUserPoolLambdaExecutionRole
      - GetUsersFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab2-get-users
      CodeUri: ../TenantManagementService/
      Handler: user-management.get_users
      Runtime: python3.14
      Role: !GetAtt TenantUserPoolLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaasLab2Layers
      Environment:
        Variables:
          TENANT_USER_POOL_ID: !Ref CognitoUserPoolId
          POWERTOOLS_SERVICE_NAME: "UserManagement.GetUsers"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab2
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter  
      
  #Tenant Management
  TenantManagementLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub serverless-saas-lab2-tenant-mgmt-exec-role-${AWS::Region}
      Path: "/"
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns: 
        - arn:aws:iam::aws:policy/CloudWatchLambdaInsightsExecutionRolePolicy    
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
      Policies:
        - PolicyName: !Sub serverless-saas-lab2-tenant-exec-policy-${AWS::Region}
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource:
                  - !Ref TenantDetailsTableArn  
                  - !Join ["", [!Ref TenantDetailsTableArn, '/index/*']]
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab2
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter               
  CreateTenantFunction:
    Type: AWS::Serverless::Function
    DependsOn: 
      - TenantManagementLambdaExecutionRole
      - CreateTenantFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab2-create-tenant
      CodeUri: ../TenantManagementService/
      Handler: tenant-management.create_tenant
      Runtime: python3.14
      Role: !GetAtt TenantManagementLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaasLab2Layers
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "TenantManagement.CreateTenant"
          TENANT_DETAILS_TABLE: ServerlessSaaS-TenantDetails-lab2
      Tags:
        Application: serverless-saas-workshop
        Lab: lab2
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
      
  ActivateTenantFunction:
    Type: AWS::Serverless::Function
    DependsOn: 
      - TenantManagementLambdaExecutionRole
      - ActivateTenantFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab2-activate-tenant
      CodeUri: ../TenantManagementService/
      Handler: tenant-management.activate_tenant
      Runtime: python3.14
      Role: !GetAtt TenantManagementLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaasLab2Layers
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "TenantManagement.ActivateTenant"
          ENABLE_USERS_BY_TENANT: "/users/enable"
          PROVISION_TENANT: "/provisioning/"
          TENANT_DETAILS_TABLE: ServerlessSaaS-TenantDetails-lab2
      Tags:
        Application: serverless-saas-workshop
        Lab: lab2
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
  
  GetTenantFunction:
    Type: AWS::Serverless::Function
    DependsOn: 
      - TenantManagementLambdaExecutionRole
      - GetTenantFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab2-get-tenant
      CodeUri: ../TenantManagementService/
      Handler: tenant-management.get_tenant
      Runtime: python3.14
      Role: !GetAtt TenantManagementLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaasLab2Layers
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "TenantManagement.GetTenant"
          TENANT_DETAILS_TABLE: ServerlessSaaS-TenantDetails-lab2
      Tags:
        Application: serverless-saas-workshop
        Lab: lab2
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter    
        
  DeactivateTenantFunction:
    Type: AWS::Serverless::Function
    DependsOn: 
      - TenantManagementLambdaExecutionRole
      - DeactivateTenantFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab2-deactivate-tenant
      CodeUri: ../TenantManagementService/
      Handler: tenant-management.deactivate_tenant
      Runtime: python3.14
      Role: !GetAtt TenantManagementLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaasLab2Layers
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "TenantManagement.DeactivateTenant"
          DEPROVISION_TENANT: "/provisioning/"
          DISABLE_USERS_BY_TENANT: "/users/disable"
          TENANT_DETAILS_TABLE: ServerlessSaaS-TenantDetails-lab2
      Tags:
        Application: serverless-saas-workshop
        Lab: lab2
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
  UpdateTenantFunction:
    Type: AWS::Serverless::Function
    DependsOn: 
      - TenantManagementLambdaExecutionRole
      - UpdateTenantFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab2-update-tenant
      CodeUri: ../TenantManagementService/
      Handler: tenant-management.update_tenant
      Runtime: python3.14
      Role: !GetAtt TenantManagementLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaasLab2Layers
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "TenantManagement.UpdateTenant"
          TENANT_DETAILS_TABLE: ServerlessSaaS-TenantDetails-lab2
      Tags:
        Application: serverless-saas-workshop
        Lab: lab2
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter          
  GetTenantsFunction:
    Type: AWS::Serverless::Function
    DependsOn: 
      - TenantManagementLambdaExecutionRole
      - GetTenantsFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab2-get-tenants
      CodeUri: ../TenantManagementService/
      Handler: tenant-management.get_tenants
      Runtime: python3.14
      Role: !GetAtt TenantManagementLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaasLab2Layers
      Environment:
        Variables:
          TENANT_DETAILS_TABLE: ServerlessSaaS-TenantDetails-lab2
      Tags:
        Application: serverless-saas-workshop
        Lab: lab2
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter 
  
  #Tenant Registration
  RegisterTenantLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub serverless-saas-lab2-tenant-reg-exec-role-${AWS::Region}
      Path: "/"
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns: 
        - arn:aws:iam::aws:policy/CloudWatchLambdaInsightsExecutionRolePolicy    
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
      Policies:
        - PolicyName: !Sub serverless-saas-lab2-tenant-reg-exec-policy-${AWS::Region}
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !GetAtt CreateTenantFunction.Arn
                  - !GetAtt CreateTenantAdminUserFunction.Arn
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab2
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
  RegisterTenantFunction:
    Type: AWS::Serverless::Function
    DependsOn: 
      - RegisterTenantLambdaExecutionRole
      - RegisterTenantFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab2-register-tenant
      CodeUri: ../TenantManagementService/
      Handler: tenant-registration.register_tenant
      Runtime: python3.14
      Role: !GetAtt RegisterTenantLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaasLab2Layers
      Environment:
        Variables: # Need to find a better way than hard coding resource paths
          CREATE_TENANT_ADMIN_USER_RESOURCE_PATH: "/user/tenant-admin"
          CREATE_TENANT_RESOURCE_PATH: "/tenant"
          PROVISION_TENANT_RESOURCE_PATH: "/provisioning"
          POWERTOOLS_SERVICE_NAME: "TenantRegistration.RegisterTenant"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab2
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter  
  
   
  
Outputs:
  RegisterTenantLambdaExecutionRoleArn: 
    Value: !GetAtt RegisterTenantLambdaExecutionRole.Arn          
  TenantManagementLambdaExecutionRoleArn: 
    Value: !GetAtt TenantManagementLambdaExecutionRole.Arn          
  RegisterTenantFunctionArn: 
    Value: !GetAtt RegisterTenantFunction.Arn
  ActivateTenantFunctionArn: 
    Value: !GetAtt ActivateTenantFunction.Arn
  GetTenantsFunctionArn: 
    Value: !GetAtt GetTenantsFunction.Arn
  CreateTenantFunctionArn: 
    Value: !GetAtt CreateTenantFunction.Arn
  GetTenantFunctionArn: 
    Value: !GetAtt GetTenantFunction.Arn          
  DeactivateTenantFunctionArn: 
    Value: !GetAtt DeactivateTenantFunction.Arn          
  UpdateTenantFunctionArn: 
    Value: !GetAtt UpdateTenantFunction.Arn
  GetUsersFunctionArn:
    Value: !GetAtt GetUsersFunction.Arn            
  GetUserFunctionArn: 
    Value: !GetAtt GetUserFunction.Arn          
  UpdateUserFunctionArn: 
    Value: !GetAtt UpdateUserFunction.Arn          
  DisableUserFunctionArn: 
