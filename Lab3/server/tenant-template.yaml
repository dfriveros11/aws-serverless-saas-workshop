AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Serverless SaaS Reference Architecture 

Globals:
  Function:
    Timeout: 29
    Layers:
      - !Sub "arn:aws:lambda:${AWS::Region}:580247275435:layer:LambdaInsightsExtension:14"
    Environment:
        Variables:
          LOG_LEVEL: DEBUG         
          POWERTOOLS_METRICS_NAMESPACE: "ServerlessSaaS"
          
Parameters:
  TenantIdParameter:
    Type: String
    Default: "pooled"
    Description: "Tenant identifier for multi-tenant tracking (default: pooled for Lab 3 pooled architecture)"
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Deployment environment for the workshop
  Owner:
    Type: String
    Default: workshop-participant
    Description: Owner identifier for resource tracking
  CostCenter:
    Type: String
    Default: serverless-saas-workshop
    Description: Cost center for billing allocation
  StageName:
    Type: String
    Default: "prod"
    Description: "Stage Name for the api"
Resources: 


  # CloudWatch Log Groups for Lambda functions
  # Note: Tags removed from log groups to avoid CloudFormation race condition bug
  # where tagging during creation can fail with "The specified log group does not exist"
  # Retention and tags are applied post-deployment via set-log-retention.sh script
  
  GetProductFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab3-get-product

  GetProductsFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab3-get-products

  CreateProductFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab3-create-product

  UpdateProductFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab3-update-product

  DeleteProductFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab3-delete-product

  GetOrdersFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab3-get-orders

  GetOrderFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab3-get-order

  CreateOrderFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab3-create-order

  UpdateOrderFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab3-update-order

  DeleteOrderFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab3-delete-order

  BusinessServicesAuthorizerFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab3-business-services-authorizer

  ServerlessSaaSLayers:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: serverless-saas-dependencies-pooled-lab3
      Description: Utilities for project
      ContentUri: layers/
      CompatibleRuntimes:
        - python3.14          
      LicenseInfo: 'MIT'
      RetentionPolicy: Retain      
    Metadata:
      BuildMethod: python3.14   
  
  ProductTable:
    Type: AWS::DynamoDB::Table
    Properties: 
      AttributeDefinitions:
        - AttributeName: shardId
          AttributeType: S          
        - AttributeName: productId
          AttributeType: S          
      KeySchema:
        - AttributeName: shardId
          KeyType: HASH  
        - AttributeName: productId
          KeyType: RANGE  
      ProvisionedThroughput: 
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5
      TableName: Product-pooled-lab3
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: TenantId
          Value: !Ref TenantIdParameter
        - Key: Lab
          Value: lab3
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter

  OrderTable:
    Type: AWS::DynamoDB::Table
    Properties: 
      AttributeDefinitions:
        - AttributeName: shardId
          AttributeType: S 
        - AttributeName: orderId
          AttributeType: S          
      KeySchema:
        - AttributeName: shardId
          KeyType: HASH 
        - AttributeName: orderId
          KeyType: RANGE  
      ProvisionedThroughput: 
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5
      TableName: Order-pooled-lab3
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: TenantId
          Value: !Ref TenantIdParameter
        - Key: Lab
          Value: lab3
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter

  ProductFunctionExecutionRole:
    Type: AWS::IAM::Role     
    Properties:
      RoleName: pooled-product-function-execution-role-lab3
      Path: '/'
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns: 
        - arn:aws:iam::aws:policy/CloudWatchLambdaInsightsExecutionRolePolicy    
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
      Policies:
        - PolicyName: pooled-product-function-policy
          PolicyDocument:
            Version: 2012-10-17
            Statement:              
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt ProductTable.Arn
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: TenantId
          Value: !Ref TenantIdParameter
        - Key: Lab
          Value: lab3
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
             
  GetProductFunction:
    Type: AWS::Serverless::Function 
    DependsOn: 
      - ProductFunctionExecutionRole
      - GetProductFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab3-get-product
      CodeUri: ProductService/
      Handler: product_service.get_product
      Runtime: python3.14  
      Tracing: Active
      Role: !GetAtt ProductFunctionExecutionRole.Arn
      Layers: 
        - !Ref ServerlessSaaSLayers
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "ProductService"
          PRODUCT_TABLE_NAME: !Ref ProductTable
      Tags:
        Application: serverless-saas-workshop
        TenantId: !Ref TenantIdParameter
        Lab: lab3
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter      
  
  GetProductsFunction:
    Type: AWS::Serverless::Function 
    DependsOn: 
      - ProductFunctionExecutionRole
      - GetProductsFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab3-get-products
      CodeUri: ProductService/
      Handler: product_service.get_products
      Runtime: python3.14  
      Tracing: Active
      Role: !GetAtt ProductFunctionExecutionRole.Arn
      Layers: 
        - !Ref ServerlessSaaSLayers
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "ProductService"
          PRODUCT_TABLE_NAME: !Ref ProductTable
      Tags:
        Application: serverless-saas-workshop
        TenantId: !Ref TenantIdParameter
        Lab: lab3
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
      
  CreateProductFunction:
    Type: AWS::Serverless::Function
    DependsOn: 
      - ProductFunctionExecutionRole
      - CreateProductFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab3-create-product
      CodeUri: ProductService/
      Handler: product_service.create_product
      Runtime: python3.14  
      Tracing: Active 
      Role: !GetAtt ProductFunctionExecutionRole.Arn 
      Layers: 
        - !Ref ServerlessSaaSLayers
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "ProductService"
          PRODUCT_TABLE_NAME: !Ref ProductTable
      Tags:
        Application: serverless-saas-workshop
        TenantId: !Ref TenantIdParameter
        Lab: lab3
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter

  UpdateProductFunction:
    Type: AWS::Serverless::Function
    DependsOn: 
      - ProductFunctionExecutionRole
      - UpdateProductFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab3-update-product
      CodeUri: ProductService/
      Handler: product_service.update_product
      Runtime: python3.14 
      Tracing: Active
      Role: !GetAtt ProductFunctionExecutionRole.Arn 
      Layers: 
        - !Ref ServerlessSaaSLayers
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "ProductService"
          PRODUCT_TABLE_NAME: !Ref ProductTable
      Tags:
        Application: serverless-saas-workshop
        TenantId: !Ref TenantIdParameter
        Lab: lab3
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter

  DeleteProductFunction:
    Type: AWS::Serverless::Function
    DependsOn: 
      - ProductFunctionExecutionRole
      - DeleteProductFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab3-delete-product
      CodeUri: ProductService/
      Handler: product_service.delete_product
      Runtime: python3.14 
      Tracing: Active
      Role: !GetAtt ProductFunctionExecutionRole.Arn 
      Layers: 
        - !Ref ServerlessSaaSLayers
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "ProductService"
          PRODUCT_TABLE_NAME: !Ref ProductTable
      Tags:
        Application: serverless-saas-workshop
        TenantId: !Ref TenantIdParameter
        Lab: lab3
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter

  OrderFunctionExecutionRole:
    Type: AWS::IAM::Role     
    Properties:
      RoleName: pooled-order-function-execution-role-lab3
      Path: '/'
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns: 
        - arn:aws:iam::aws:policy/CloudWatchLambdaInsightsExecutionRolePolicy    
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
      Policies:
        - PolicyName: pooled-order-function-policy
          PolicyDocument:
            Version: 2012-10-17
            Statement:              
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt OrderTable.Arn
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: TenantId
          Value: !Ref TenantIdParameter
        - Key: Lab
          Value: lab3
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
                
  GetOrdersFunction:
    Type: AWS::Serverless::Function 
    DependsOn: 
      - OrderFunctionExecutionRole
      - GetOrdersFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab3-get-orders
      CodeUri: OrderService/
      Handler: order_service.get_orders
      Runtime: python3.14  
      Tracing: Active
      Role: !GetAtt OrderFunctionExecutionRole.Arn
      Layers: 
        - !Ref ServerlessSaaSLayers
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "OrderService"
          ORDER_TABLE_NAME: !Ref OrderTable
      Tags:
        Application: serverless-saas-workshop
        TenantId: !Ref TenantIdParameter
        Lab: lab3
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
      
  GetOrderFunction:
    Type: AWS::Serverless::Function 
    DependsOn: 
      - OrderFunctionExecutionRole
      - GetOrderFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab3-get-order
      CodeUri: OrderService/
      Handler: order_service.get_order
      Runtime: python3.14  
      Tracing: Active
      Role: !GetAtt OrderFunctionExecutionRole.Arn
      Layers: 
        - !Ref ServerlessSaaSLayers
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "OrderService"
          ORDER_TABLE_NAME: !Ref OrderTable
      Tags:
        Application: serverless-saas-workshop
        TenantId: !Ref TenantIdParameter
        Lab: lab3
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
      
  CreateOrderFunction:
    Type: AWS::Serverless::Function
    DependsOn: 
      - OrderFunctionExecutionRole
      - CreateOrderFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab3-create-order
      CodeUri: OrderService/
      Handler: order_service.create_order
      Runtime: python3.14  
      Tracing: Active 
      Role: !GetAtt OrderFunctionExecutionRole.Arn 
      Layers: 
        - !Ref ServerlessSaaSLayers
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "OrderService"
          ORDER_TABLE_NAME: !Ref OrderTable
      Tags:
        Application: serverless-saas-workshop
        TenantId: !Ref TenantIdParameter
        Lab: lab3
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
  
  UpdateOrderFunction:
    Type: AWS::Serverless::Function
    DependsOn: 
      - OrderFunctionExecutionRole
      - UpdateOrderFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab3-update-order
      CodeUri: OrderService/
      Handler: order_service.update_order
      Runtime: python3.14 
      Tracing: Active
      Role: !GetAtt OrderFunctionExecutionRole.Arn 
      Layers: 
        - !Ref ServerlessSaaSLayers
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "OrderService"
          ORDER_TABLE_NAME: !Ref OrderTable
      Tags:
        Application: serverless-saas-workshop
        TenantId: !Ref TenantIdParameter
        Lab: lab3
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
  
  DeleteOrderFunction:
    Type: AWS::Serverless::Function
    DependsOn: 
      - OrderFunctionExecutionRole
      - DeleteOrderFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab3-delete-order
      CodeUri: OrderService/
      Handler: order_service.delete_order
      Runtime: python3.14 
      Tracing: Active
      Role: !GetAtt OrderFunctionExecutionRole.Arn 
      Layers: 
        - !Ref ServerlessSaaSLayers
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "OrderService"
          ORDER_TABLE_NAME: !Ref OrderTable
      Tags:
        Application: serverless-saas-workshop
        TenantId: !Ref TenantIdParameter
        Lab: lab3
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
  
  #Tenant Authorizer
  TenantAuthorizerExecutionRole:
    Type: AWS::IAM::Role     
    Properties:
      RoleName: tenant-authorizer-execution-role-lab3
      Path: '/'
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns: 
        - arn:aws:iam::aws:policy/CloudWatchLambdaInsightsExecutionRolePolicy    
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess   
      Policies:      
        - PolicyName: tenant-authorizer-execution-policy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:List*                                    
                Resource:
                  - !Sub arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/*
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: TenantId
          Value: !Ref TenantIdParameter
        - Key: Lab
          Value: lab3
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter    
    
  BusinessServicesAuthorizerFunction:
    Type: AWS::Serverless::Function 
    DependsOn: 
      - TenantAuthorizerExecutionRole
      - BusinessServicesAuthorizerFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab3-business-services-authorizer
      CodeUri: Resources/
      Handler: tenant_authorizer.lambda_handler
      Runtime: python3.14
      Role: !GetAtt TenantAuthorizerExecutionRole.Arn
      MemorySize: 256
      Tracing: Active
      Layers: 
        - !Ref ServerlessSaaSLayers
      Environment:
        Variables:
          TENANT_USER_POOL: !ImportValue Serverless-SaaS-CognitoTenantUserPoolId
          TENANT_APP_CLIENT: !ImportValue Serverless-SaaS-CognitoTenantAppClientId
      Tags:
        Application: serverless-saas-workshop
        TenantId: !Ref TenantIdParameter
        Lab: lab3
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter

  ApiGatewayAccessLogs:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/api-gateway/access-logs-serverless-saas-lab3-tenant-${TenantIdParameter}
          
  # Note: Tags removed from log groups to avoid CloudFormation race condition bug
  # where tagging during creation can fail with "The specified log group does not exist"
  ApiGatewayTenantApi:
    Type: AWS::Serverless::Api
    Properties:
      Tags:
        Application: serverless-saas-workshop
        TenantId: !Ref TenantIdParameter
        Lab: lab3
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
      MethodSettings:
        - DataTraceEnabled: False
          LoggingLevel: INFO
          MetricsEnabled: True
          ResourcePath: '/*' 
          HttpMethod: '*' 
      AccessLogSetting:
        DestinationArn: !GetAtt ApiGatewayAccessLogs.Arn
        Format: '{ "requestId":"$context.requestId", "ip": "$context.identity.sourceIp", "caller":"$context.identity.caller", "user":"$context.identity.user","requestTime":"$context.requestTime", "httpMethod":"$context.httpMethod","resourcePath":"$context.resourcePath", "status":"$context.status","protocol":"$context.protocol", "responseLength":"$context.responseLength" }'
      TracingEnabled: True
      DefinitionBody:
        openapi: 3.0.1
        info:
          title: 'pooled-serverless-saas-tenant-api-lab3'
        basePath: !Join ['', ['/', !Ref StageName]]
        x-amazon-apigateway-api-key-source : "AUTHORIZER"
        schemes:
          - https
        paths:
          /order/{id}:
            get:
              summary: Returns a order
              description: Return a order by a order id.
              produces:
                - application/json
              parameters:
                - name: id
                  in: path
                  required: true
                  type: string
              responses: {}
              security:        
                - Authorizer: []
              x-amazon-apigateway-integration:
                uri: !Join
                  - ''
                  - - !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/
                    -  !GetAtt GetOrderFunction.Arn
                    - /invocations
                httpMethod: POST
                type: aws_proxy 
            put:              
              produces:
                - application/json
              responses: {}
              security:      
                - Authorizer: []
              x-amazon-apigateway-integration:
                uri: !Join
                  - ''
                  - - !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/
                    -  !GetAtt UpdateOrderFunction.Arn
                    - /invocations
                httpMethod: POST
                type: aws_proxy     
            delete:
              summary: Deletes a order
              description: Deletes a order by a order id.
              produces:
                - application/json
              parameters:
                - name: id
                  in: path
                  required: true
                  type: string
              responses: {}
              security:       
                - Authorizer: []
              x-amazon-apigateway-integration:
                uri: !Join
                  - ''
                  - - !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/
                    -  !GetAtt DeleteOrderFunction.Arn
                    - /invocations
                httpMethod: POST
                type: aws_proxy
            options:
              consumes:
                - application/json
              produces:
                - application/json
              responses:
                '200':
                  description: 200 response
                  schema:
                    $ref: "#/definitions/Empty"
                  headers:
                    Access-Control-Allow-Origin:
                      type: string
                    Access-Control-Allow-Methods:
                      type: string
                    Access-Control-Allow-Headers:
                      type: string
              x-amazon-apigateway-integration:
                responses:
                  default:
                    statusCode: 200
                    responseParameters:
                      method.response.header.Access-Control-Allow-Methods: "'DELETE,GET,HEAD,OPTIONS,PATCH,POST,PUT'"
                      method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
                      method.response.header.Access-Control-Allow-Origin:  "'*'"
                passthroughBehavior: when_no_match
                requestTemplates:
                  application/json: "{\"statusCode\": 200}"
                type: mock      
          /orders:
            get:
              summary: Returns all orders
              description: Returns all orders.
              produces:
                - application/json
              responses: {}
              security:     
                - Authorizer: []
              x-amazon-apigateway-integration:
                uri: !Join
                  - ''
                  - - !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/
                    -  !GetAtt GetOrdersFunction.Arn
                    - /invocations
                httpMethod: POST
                type: aws_proxy
            options:
              consumes:
                - application/json
              produces:
                - application/json
              responses:
                '200':
                  description: 200 response
                  schema:
                    $ref: "#/definitions/Empty"
                  headers:
                    Access-Control-Allow-Origin:
                      type: string
                    Access-Control-Allow-Methods:
                      type: string
                    Access-Control-Allow-Headers:
                      type: string
              x-amazon-apigateway-integration:
                responses:
                  default:
                    statusCode: 200
                    responseParameters:
                      method.response.header.Access-Control-Allow-Methods: "'DELETE,GET,HEAD,OPTIONS,PATCH,POST,PUT'"
                      method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
                      method.response.header.Access-Control-Allow-Origin:  "'*'"
                passthroughBehavior: when_no_match
                requestTemplates:
                  application/json: "{\"statusCode\": 200}"
                type: mock                              
          /order:
            post:              
              produces:
                - application/json
              responses: {}
              security:         
                - Authorizer: []
              x-amazon-apigateway-integration:
                uri: !Join
                  - ''
                  - - !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/
                    -  !GetAtt CreateOrderFunction.Arn
                    - /invocations
                httpMethod: POST
                type: aws_proxy
            options:
              consumes:
                - application/json
              produces:
                - application/json
              responses:
                '200':
                  description: 200 response
                  schema:
                    $ref: "#/definitions/Empty"
                  headers:
                    Access-Control-Allow-Origin:
                      type: string
                    Access-Control-Allow-Methods:
                      type: string
                    Access-Control-Allow-Headers:
                      type: string
              x-amazon-apigateway-integration:
                responses:
                  default:
                    statusCode: 200
                    responseParameters:
                      method.response.header.Access-Control-Allow-Methods: "'DELETE,GET,HEAD,OPTIONS,PATCH,POST,PUT'"
                      method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
                      method.response.header.Access-Control-Allow-Origin:  "'*'"
                passthroughBehavior: when_no_match
                requestTemplates:
                  application/json: "{\"statusCode\": 200}"
                type: mock     
          /product/{id}:
            get:
              summary: Returns a product
              description: Return a product by a product id.
              produces:
                - application/json
              parameters:
                - name: id
                  in: path
                  required: true
                  type: string
              responses: {}
              security:  
                - Authorizer: []
              x-amazon-apigateway-integration:
                uri: !Join
                  - ''
                  - - !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/
                    -  !GetAtt GetProductFunction.Arn
                    - /invocations
                httpMethod: POST
                type: aws_proxy 
            put:              
              produces:
                - application/json
              responses: {}
              security: 
                - Authorizer: []
              x-amazon-apigateway-integration:
                uri: !Join
                  - ''
                  - - !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/
                    -  !GetAtt UpdateProductFunction.Arn
                    - /invocations
                httpMethod: POST
                type: aws_proxy     
            delete:
              summary: Deletes a product
              description: Deletes a product by a product id.
              produces:
