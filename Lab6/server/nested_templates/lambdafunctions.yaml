AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Template to deploy lambda functions as part of bootstrap
Parameters:
  CognitoOperationUsersUserPoolId:
    Type: String
  CognitoOperationUsersUserPoolClientId:
    Type: String
  CognitoUserPoolId: 
    Type: String
  CognitoUserPoolClientId: 
    Type: String
  TenantDetailsTableArn:
    Type: String
  ServerlessSaaSSettingsTableArn:
    Type: String
  ApiKeyOperationUsersParameter:
    Type: String
  ApiKeyPlatinumTierParameter:
    Type: String
  ApiKeyPremiumTierParameter:
    Type: String
  ApiKeyStandardTierParameter:
    Type: String
  ApiKeyBasicTierParameter:
    Type: String  
  TenantStackMappingTableArn:
    Type: String
  TenantUserMappingTableArn:
    Type: String
  TenantStackMappingTableName:
    Type: String
  TenantUserPoolCallbackURLParameter:
    Type: String
    Description: "Enter Tenant Management userpool call back url"
  Environment:
    Type: String
    Description: "Environment name (dev, staging, prod)"
  Owner:
    Type: String
    Description: "Owner of the resources"
  CostCenter:
    Type: String
    Description: "Cost center for billing"    
Globals:
  Function:
    Timeout: 29
    Layers:
      - !Sub "arn:aws:lambda:${AWS::Region}:580247275435:layer:LambdaInsightsExtension:14"
    Environment:
      Variables:
        LOG_LEVEL: DEBUG        
        POWERTOOLS_METRICS_NAMESPACE: "ServerlessSaaS"
        
Resources:
  # CloudWatch Log Groups for Lambda functions
  # Note: Retention and tags are set by post-deployment script to avoid race conditions
  SharedServicesAuthorizerFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab6-shared-services-authorizer

  CreateTenantAdminUserFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab6-create-tenant-admin-user

  CreateUserFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab6-create-user

  UpdateUserFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab6-update-user

  DisableUserFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab6-disable-user

  DisableUsersByTenantFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab6-disable-users-by-tenant

  EnableUsersByTenantFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab6-enable-users-by-tenant

  GetUserFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab6-get-user

  GetUsersFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab6-get-users

  CreateTenantFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab6-create-tenant

  ActivateTenantFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab6-activate-tenant

  GetTenantFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab6-get-tenant

  DeactivateTenantFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab6-deactivate-tenant

  UpdateTenantFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab6-update-tenant

  GetTenantsFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab6-get-tenants

  GetTenantConfigFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab6-get-tenant-config

  RegisterTenantFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab6-register-tenant

  ProvisionTenantFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab6-provision-tenant

  DeProvisionTenantFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab6-de-provision-tenant

  UpdateSettingsTableFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab6-update-settings-table

  UpdateTenantStackMapTableFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/serverless-saas-lab6-update-tenant-stack-map-table

  ServerlessSaaSLayers:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: serverless-saas-dependencies-lab6
      Description: Utilities for project
      ContentUri: ../layers/
      CompatibleRuntimes:
        - python3.12
      LicenseInfo: "MIT"
      RetentionPolicy: Retain
    Metadata:
      BuildMethod: python3.12

  #Tenant Authorizer
  AuthorizerExecutionRole:
    Type: AWS::IAM::Role     
    Properties:
      RoleName: authorizer-execution-role-lab6
      Path: '/'
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns: 
        - arn:aws:iam::aws:policy/CloudWatchLambdaInsightsExecutionRolePolicy    
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess   
      Policies:      
        - PolicyName: authorizer-execution-policy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:List*                                    
                Resource:
                  - !Sub arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/*    
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource:
                  - !Ref TenantDetailsTableArn
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab6
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter    
  AuthorizerAccessRole:
    Type: AWS::IAM::Role
    DependsOn: AuthorizerExecutionRole
    Properties:
      RoleName: authorizer-access-role-lab6
      Path: '/'
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !GetAtt 'AuthorizerExecutionRole.Arn'
            Action:
              - sts:AssumeRole       
      Policies:
        - PolicyName: authorizer-access-role-policy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:BatchGetItem     
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan     
                Resource:  
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/*
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab6
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
  SharedServicesAuthorizerFunction:
    Type: AWS::Serverless::Function 
    DependsOn:
      - AuthorizerAccessRole
      - SharedServicesAuthorizerFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab6-shared-services-authorizer
      CodeUri: ../Resources/
      Handler: shared_service_authorizer.lambda_handler
      Runtime: python3.12
      Role: !GetAtt AuthorizerExecutionRole.Arn
      MemorySize: 256
      Tracing: Active
      Layers: 
        - !Ref ServerlessSaaSLayers
      Environment:
        Variables:
          OPERATION_USERS_USER_POOL: !Ref CognitoOperationUsersUserPoolId
          OPERATION_USERS_APP_CLIENT: !Ref CognitoOperationUsersUserPoolClientId
          OPERATION_USERS_API_KEY : !Ref ApiKeyOperationUsersParameter
      Tags:
        Application: serverless-saas-workshop
        Lab: lab6
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
        
          
  
  #Create user pool for the tenant
  TenantUserPoolLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub tenant-userpool-lambda-execution-role-lab6-${AWS::Region}
      Path: "/"
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole          
      ManagedPolicyArns: 
        - arn:aws:iam::aws:policy/CloudWatchLambdaInsightsExecutionRolePolicy    
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
      Policies:
        - PolicyName: !Sub tenant-userpool-lambda-execution-policy-${AWS::Region}
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:*
                Resource: "*"
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource:
                  - !Ref TenantDetailsTableArn
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource:
                  - !Ref TenantUserMappingTableArn
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab6
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
  CreateUserLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub create-user-lambda-execution-role-lab6-${AWS::Region}
      Path: "/"
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole          
      ManagedPolicyArns: 
        - arn:aws:iam::aws:policy/CloudWatchLambdaInsightsExecutionRolePolicy    
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
      Policies:
        - PolicyName: !Sub create-user-lambda-execution-policy-${AWS::Region}
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:*
                Resource: "*"
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource:
                  - !Ref TenantUserMappingTableArn
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource:
                  - !Ref TenantDetailsTableArn
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab6
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter
  CreateTenantAdminUserFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - CreateUserLambdaExecutionRole
      - CreateTenantAdminUserFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab6-create-tenant-admin-user
      CodeUri: ../TenantManagementService/
      Handler: user-management.create_tenant_admin_user
      Runtime: python3.12
      Role: !GetAtt CreateUserLambdaExecutionRole.Arn      
      Tracing: Active
      Layers:
        - !Ref ServerlessSaaSLayers
      Environment:
        Variables:
          TENANT_USER_POOL_ID: !Ref CognitoUserPoolId
          TENANT_APP_CLIENT_ID: !Ref CognitoUserPoolClientId
          TENANT_USER_POOL_CALLBACK_URL: !Join ["",["https://",!Ref TenantUserPoolCallbackURLParameter, "/"]]
          POWERTOOLS_SERVICE_NAME: "UserManagement.CreateTenantAdmin"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab6
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter   

  #User management
  CreateUserFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - CreateUserLambdaExecutionRole
      - CreateUserFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab6-create-user
      CodeUri: ../TenantManagementService/
      Handler: user-management.create_user
      Runtime: python3.12
      Role: !GetAtt CreateUserLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaaSLayers
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "UserManagement.CreateUser"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab6
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter

  UpdateUserFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - TenantUserPoolLambdaExecutionRole
      - UpdateUserFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab6-update-user
      CodeUri: ../TenantManagementService/
      Handler: user-management.update_user
      Runtime: python3.12
      Role: !GetAtt TenantUserPoolLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaaSLayers
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "UserManagement.UpdateUser"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab6
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter

  DisableUserFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - TenantUserPoolLambdaExecutionRole
      - DisableUserFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab6-disable-user
      CodeUri: ../TenantManagementService/
      Handler: user-management.disable_user
      Runtime: python3.12
      Role: !GetAtt TenantUserPoolLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaaSLayers
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "UserManagement.DisableUser"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab6
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
         
  DisableUsersByTenantFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - TenantUserPoolLambdaExecutionRole
      - DisableUsersByTenantFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab6-disable-users-by-tenant
      CodeUri: ../TenantManagementService/
      Handler: user-management.disable_users_by_tenant
      Runtime: python3.12
      Role: !GetAtt TenantUserPoolLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaaSLayers
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "UserManagement.DisableUsersByTenant"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab6
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
           
  EnableUsersByTenantFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - TenantUserPoolLambdaExecutionRole
      - EnableUsersByTenantFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab6-enable-users-by-tenant
      CodeUri: ../TenantManagementService/
      Handler: user-management.enable_users_by_tenant
      Runtime: python3.12
      Role: !GetAtt TenantUserPoolLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaaSLayers
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "UserManagement.EnableUsersByTenant"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab6
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
        
  GetUserFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - TenantUserPoolLambdaExecutionRole
      - GetUserFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab6-get-user
      CodeUri: ../TenantManagementService/
      Handler: user-management.get_user
      Runtime: python3.12
      Role: !GetAtt TenantUserPoolLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaaSLayers
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "UserManagement.GetUser"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab6
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
         
  GetUsersFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - TenantUserPoolLambdaExecutionRole
      - GetUsersFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab6-get-users
      CodeUri: ../TenantManagementService/
      Handler: user-management.get_users
      Runtime: python3.12
      Role: !GetAtt TenantUserPoolLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaaSLayers
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "UserManagement.GetUsers"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab6
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter  
             
  
  #Tenant Management
  TenantManagementLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub tenant-management-lambda-execution-role-lab6-${AWS::Region}
      Path: "/"
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns: 
        - arn:aws:iam::aws:policy/CloudWatchLambdaInsightsExecutionRolePolicy    
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
      Policies:
        - PolicyName: !Sub create-tenant-execution-policy-${AWS::Region}
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource:
                  - !Ref TenantDetailsTableArn  
                  - !Join ["", [!Ref TenantDetailsTableArn, '/index/*']] 
              - Effect: Allow
                Action:
                  - dynamodb:GetItem                  
                Resource:
                  - !Ref ServerlessSaaSSettingsTableArn
      Tags:
        - Key: Application
          Value: serverless-saas-workshop
        - Key: Lab
          Value: lab6
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: CostCenter
          Value: !Ref CostCenter                 
  CreateTenantFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - TenantManagementLambdaExecutionRole
      - CreateTenantFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab6-create-tenant
      CodeUri: ../TenantManagementService/
      Handler: tenant-management.create_tenant
      Runtime: python3.12
      Role: !GetAtt TenantManagementLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaaSLayers
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "TenantManagement.CreateTenant"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab6
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
          
  ActivateTenantFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - TenantManagementLambdaExecutionRole
      - ActivateTenantFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab6-activate-tenant
      CodeUri: ../TenantManagementService/
      Handler: tenant-management.activate_tenant
      Runtime: python3.12
      Role: !GetAtt TenantManagementLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaaSLayers
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "TenantManagement.ActivateTenant"
          ENABLE_USERS_BY_TENANT: "/users/enable"
          PROVISION_TENANT: "/provisioning/"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab6
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
          
  GetTenantFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - TenantManagementLambdaExecutionRole
      - GetTenantFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab6-get-tenant
      CodeUri: ../TenantManagementService/
      Handler: tenant-management.get_tenant
      Runtime: python3.12
      Role: !GetAtt TenantManagementLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaaSLayers
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "TenantManagement.GetTenant"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab6
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter    
        
  DeactivateTenantFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - TenantManagementLambdaExecutionRole
      - DeactivateTenantFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab6-deactivate-tenant
      CodeUri: ../TenantManagementService/
      Handler: tenant-management.deactivate_tenant
      Runtime: python3.12
      Role: !GetAtt TenantManagementLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaaSLayers
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "TenantManagement.DeactivateTenant"
          DEPROVISION_TENANT: "/provisioning/"
          DISABLE_USERS_BY_TENANT: "/users/disable"
      Tags:
        Application: serverless-saas-workshop
        Lab: lab6
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
                 
  UpdateTenantFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - TenantManagementLambdaExecutionRole
      - UpdateTenantFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab6-update-tenant
      CodeUri: ../TenantManagementService/
      Handler: tenant-management.update_tenant
      Runtime: python3.12
      Role: !GetAtt TenantManagementLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaaSLayers
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: "TenantManagement.UpdateTenant"
          PLATINUM_TIER_API_KEY: !Ref ApiKeyPlatinumTierParameter
          PREMIUM_TIER_API_KEY: !Ref ApiKeyPremiumTierParameter
          STANDARD_TIER_API_KEY: !Ref ApiKeyStandardTierParameter
          BASIC_TIER_API_KEY: !Ref ApiKeyBasicTierParameter
      Tags:
        Application: serverless-saas-workshop
        Lab: lab6
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
                 
  GetTenantsFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - TenantManagementLambdaExecutionRole
      - GetTenantsFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab6-get-tenants
      CodeUri: ../TenantManagementService/
      Handler: tenant-management.get_tenants
      Runtime: python3.12
      Role: !GetAtt TenantManagementLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaaSLayers
      Tags:
        Application: serverless-saas-workshop
        Lab: lab6
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter 
      
  GetTenantConfigFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - TenantManagementLambdaExecutionRole
      - GetTenantConfigFunctionLogGroup
    Properties:
      FunctionName: serverless-saas-lab6-get-tenant-config
      CodeUri: ../TenantManagementService/
      Handler: tenant-management.load_tenant_config
      Runtime: python3.12
      Role: !GetAtt TenantManagementLambdaExecutionRole.Arn
      Tracing: Active
      Layers:
        - !Ref ServerlessSaaSLayers
      Tags:
        Application: serverless-saas-workshop
        Lab: lab6
        Environment: !Ref Environment
        Owner: !Ref Owner
        CostCenter: !Ref CostCenter
                  
  
  #Tenant Registration
  RegisterTenantLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub tenant-registration-lambda-execution-role-lab6-${AWS::Region}
      Path: "/"
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns: 
        - arn:aws:iam::aws:policy/CloudWatchLambdaInsightsExecutionRolePolicy    
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
      Tags:
        - Key: Application
