version: 0.2
phases:
  install:
    commands:
      # Use the system Python that comes with the CodeBuild image
      # This avoids pyenv SSL compilation issues
      - python3 --version
      # Install packages or any pre-reqs in this phase.
      # Use latest SAM CLI version
      - python3 -m pip install --upgrade aws-sam-cli
      - sam --version
      # Installing project dependencies
      - cd Lab6/server/ProductService
      - python3 -m pip install -r requirements.txt 
      - cd ../OrderService
      - python3 -m pip install -r requirements.txt 
      

  pre_build:
    commands:
      # Run tests, lint scripts or any other pre-build checks.
      - cd ..
      - export PYTHONPATH=./ProductService/
      # unit tests needs to be fixed. Commenting for now
      #- python -m pytest tests/unit/ProductService-test_handler.py

  build:
    commands:
      # Use Build phase to build your artifacts (compile, etc.)
      # Use --use-container to build Lambda functions in Docker containers with correct Python version
      - sam build -t tenant-template.yaml --use-container

  post_build:
    commands:
      # Use Post-Build for notifications, git tags, upload artifacts to S3
      # Package the template and upload to S3 - deployment is handled by Lambda in Deploy stage
      - sam package --s3-bucket $PACKAGE_BUCKET --output-template-file packaged.yaml

artifacts:
  discard-paths: yes
  files:
    # List of local artifacts that will be passed down the pipeline
    - Lab6/server/packaged.yaml